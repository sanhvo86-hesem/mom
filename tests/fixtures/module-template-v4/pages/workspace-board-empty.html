<!doctype html>
<html><head><meta charset="utf-8"><title>HMV4 Fixture</title>
<link rel="stylesheet" href="../../../../mom/styles/module-template-v4.tokens.css">
<link rel="stylesheet" href="../../../../mom/styles/module-template-v4.css">
</head><body>
<div id="hmv4-fixture-root"></div>
<script type="application/json" data-hmv4-fixture-route>
{
  "fixtureId": "workspace-board-empty",
  "path": "/ops/planning-scheduling/dispatch-board/board?view=empty",
  "routeClass": "WS",
  "expectedRenderer": "renderDispatchBoardWorkspace",
  "coverage": ["dispatch_board_empty", "required_dispatch_board_empty_view"]
}
</script>
<script type="application/json" data-hmv4-dispatch-board-fixture>
{
  "projectionId": "DISP-BOARD-FIXTURE-EMPTY",
  "route": "/ops/planning-scheduling/dispatch-board/board?view=empty",
  "authorityClass": "projection",
  "requiresReanchor": true,
  "freshness": "fixture_current",
  "state": "empty",
  "reanchorMessage": "No dispatch mutation is available from an empty projection.",
  "summary": {
    "ready": 0,
    "running": 0,
    "blocked": 0,
    "stale": 0
  },
  "lanes": [
    {
      "id": "ready",
      "title": "Ready",
      "description": "No ready targets in this fixture view.",
      "cards": []
    },
    {
      "id": "running",
      "title": "Running",
      "description": "No running targets in this fixture view.",
      "cards": []
    },
    {
      "id": "blocked",
      "title": "Blocked",
      "description": "No blocked targets in this fixture view.",
      "cards": []
    }
  ]
}
</script>
<script>
(function(){
  var node = document.querySelector('[data-hmv4-dispatch-board-fixture]');
  if(!node) return;
  try {
    window.HMV4_DISPATCH_BOARD_PROJECTION = JSON.parse(node.textContent || '{}');
  } catch(e) {
    console.warn('[HMV4 fixture] invalid dispatch projection', e);
  }
})();
</script>
<script>window.HMV4_PREVIEW_ENABLED=true;</script>
<script src="../../../../mom/scripts/portal/71-module-template-v4-routes.js"></script>
<script src="../../../../mom/scripts/portal/72-module-template-v4-bridge.js"></script>
<script src="../../../../mom/scripts/portal/73-module-template-v4-renderers.js"></script>
<script src="../../../../mom/scripts/portal/70-module-template-v4-hydration.js"></script>
<script>
(function(){
  var node = document.querySelector('[data-hmv4-fixture-route]');
  if(!node) return;
  try {
    var route = JSON.parse(node.textContent || '{}');
    window.HMV4_FIXTURE_ROUTE_CONTEXT = route;
    if(route.path && window.history) history.replaceState(history.state || {}, '', route.path);
  } catch(e) {
    console.warn('[HMV4 fixture] invalid route context', e);
  }
})();
</script>
</body></html>
