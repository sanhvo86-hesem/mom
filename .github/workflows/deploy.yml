name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Block generated/runtime artifacts in controlled source
        run: php mom/tools/release/check_repo_boundary.php

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            git fetch origin main
            git checkout main
            git pull origin main
            cd mom
            composer install --no-dev --optimize-autoloader --no-interaction
            php scripts/postdeploy_healthcheck.php
            sudo systemctl reload php-fpm || sudo systemctl reload php8.3-fpm || true
            echo "Deploy completed at $(date)"
