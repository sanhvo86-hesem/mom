name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          # Need 2 commits so the runtime-files diff can compare against the
          # previous SHA. fetch-depth: 0 would also work but is heavier.
          fetch-depth: 2
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'

      - name: Refuse runtime config / docs in commit
        # Hard gate: even if the deploy.sh capture/restore would catch this
        # at runtime, we don't want runtime data flowing through git history
        # at all. ISO ALCOA+ "Original" requires changes to live data go
        # through data-push.sh with a change-ref, not a code commit.
        run: |
          set -euo pipefail
          # shellcheck source=tools/vps-setup/scripts/_runtime-files.sh
          . tools/vps-setup/scripts/_runtime-files.sh
          BASE="${{ github.event.before }}"
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            BASE="HEAD~1"
          fi
          DIFF="$(git diff --name-only "$BASE" HEAD || true)"
          OFFENDERS="$(printf '%s\n' "$DIFF" | grep -E "$RUNTIME_CONFIG_REGEX" || true)"
          if [ -n "$OFFENDERS" ]; then
            echo "::error::This push modifies runtime-mutated config files:" >&2
            echo "$OFFENDERS" | sed 's/^/  - /' >&2
            echo "" >&2
            echo "Runtime config must NOT travel through git." >&2
            echo "Use: bash tools/vps-setup/scripts/data-sync.sh" >&2
            echo "  or: bash tools/vps-setup/scripts/data-push.sh --change-ref CR-XXX" >&2
            exit 1
          fi

      - name: Verify runtime-files preserve list covers all PHP writers
        # If a developer added a new save_*() / saveConfig() / write_json_file()
        # call whose path resolves under mom/data/config/ but didn't add the
        # basename to RUNTIME_CONFIG_FILES in _runtime-files.sh, the next
        # deploy will silently clobber that file. Catch it here, before SSH.
        run: php tools/vps-setup/scripts/audit-runtime-files.php

      - name: Block generated/runtime artifacts in controlled source
        run: php mom/tools/release/check_repo_boundary.php

      - name: Enforce user identity SSOT (.ai/USER_IDENTITY_SSOT.md)
        # Fails the deploy if any code path: (a) hardcodes role-key literals
        # outside the ROLES owner files, (b) creates a new table with
        # username/full_name/employee_name/password_hash outside the existing
        # user-identity tables, (c) writes directly to users/employees/
        # hcm_employees outside AuthUserShadowSyncService, or (d) calls
        # file_put_contents() against users.json outside DataSyncMutationService.
        # Policy lives at .ai/USER_IDENTITY_SSOT.md so AI assistants and
        # humans share one authoritative reference.
        run: php mom/tools/release/check_user_identity_ssot.php

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('mom/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install validation dependencies
        working-directory: mom
        run: composer install --no-interaction --prefer-dist

      # Split into 3 steps so the GitHub Actions UI shows EXACTLY which gate
      # fails. Previously bundled into one step where a phpunit failure
      # looked identical to a phpstan failure looked identical to a
      # workflow-status-authority failure.
      #
      # NOTE: "composer check" = @analyse + @test — do NOT add it back here;
      # it would run PHPStan and PHPUnit a second time, doubling CI duration.
      #
      # Use system `composer` (provided by setup-php), NOT `./composer` —
      # the local wrapper at mom/composer is gitignored and absent in CI.
      - name: Validate — phpstan analyse
        working-directory: mom
        env: { APP_ENV: test, DB_PASSWORD: test_password }
        run: composer analyse -- --memory-limit=1G

      - name: Validate — phpunit tests
        working-directory: mom
        env: { APP_ENV: test, DB_PASSWORD: test_password }
        run: composer test

      - name: Validate — workflow status authority
        working-directory: mom
        env: { APP_ENV: test, DB_PASSWORD: test_password }
        run: php tools/release/check_workflow_status_authority.php

      - name: Verify governed promotion inputs (when configured)
        env:
          RELEASE_MANIFEST_REF: ${{ vars.RELEASE_MANIFEST_REF }}
          CHANGE_AUTHORITY_REF: ${{ vars.CHANGE_AUTHORITY_REF }}
          DEPLOY_COMMIT_SHA: ${{ github.sha }}
        run: |
          # Pre-production posture (per ADR-0001): controlled-source
          # promotion via release manifest is OPTIONAL. When the repo
          # variables RELEASE_MANIFEST_REF + CHANGE_AUTHORITY_REF are
          # both configured, the manifest binding is verified strictly
          # (the original ISO ALCOA+ guarantee). When either is empty,
          # we log a warning and proceed — operationally necessary
          # because the manifest cannot self-reference its own commit
          # SHA, so a manifest must be authored against a parent commit
          # and bound to its child via this gate. Pre-production work
          # iterates faster than that handshake; the gate is wired up
          # for production cutover (ADR-0001) but does not block
          # development deploys when the inputs are not yet provisioned.
          if [ -n "$RELEASE_MANIFEST_REF" ] && [ -n "$CHANGE_AUTHORITY_REF" ]; then
            php mom/tools/release/verify_release_manifest_binding.php \
              --manifest-ref="$RELEASE_MANIFEST_REF" \
              --change-authority-ref="$CHANGE_AUTHORITY_REF" \
              --commit-sha="$DEPLOY_COMMIT_SHA"
          else
            echo "::warning::RELEASE_MANIFEST_REF / CHANGE_AUTHORITY_REF unset — proceeding without manifest binding verification (pre-production posture). Set both variables to enforce strict governance for the production cutover."
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # Requires the SSH user to have a NOPASSWD sudo rule for the deploy
          # script. Provision once during VPS setup, e.g.:
          #   echo "${VPS_USER} ALL=(root) NOPASSWD: /usr/bin/bash ${DEPLOY_PATH}/tools/vps-setup/scripts/deploy.sh" \
          #     | sudo tee /etc/sudoers.d/qms-deploy
          # `sudo -n` fails fast (instead of hanging) if NOPASSWD is missing.
          script: |
            set -euo pipefail
            sudo -n bash ${{ secrets.DEPLOY_PATH }}/tools/vps-setup/scripts/deploy.sh
            echo "Deploy completed at $(date)"
