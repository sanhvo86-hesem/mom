name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Block generated/runtime artifacts in controlled source
        run: php mom/tools/release/check_repo_boundary.php

      - name: Install validation dependencies
        working-directory: mom
        run: composer install --no-interaction --prefer-dist

      - name: Validate controlled source before deploy
        working-directory: mom
        env:
          APP_ENV: test
          DB_PASSWORD: test_password
        run: |
          ./composer analyse -- --memory-limit=1G
          ./composer test
          ./composer check
          php tools/release/check_workflow_status_authority.php

      - name: Require governed promotion inputs
        env:
          RELEASE_MANIFEST_REF: ${{ vars.RELEASE_MANIFEST_REF }}
          CHANGE_AUTHORITY_REF: ${{ vars.CHANGE_AUTHORITY_REF }}
          DEPLOY_COMMIT_SHA: ${{ github.sha }}
        run: |
          php mom/tools/release/verify_release_manifest_binding.php \
            --manifest-ref="$RELEASE_MANIFEST_REF" \
            --change-authority-ref="$CHANGE_AUTHORITY_REF" \
            --commit-sha="$DEPLOY_COMMIT_SHA"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            git fetch origin main
            git checkout main
            git pull origin main
            cd mom
            composer install --no-dev --optimize-autoloader --no-interaction
            php scripts/postdeploy_healthcheck.php
            sudo systemctl reload php-fpm || sudo systemctl reload php8.3-fpm || true
            echo "Deploy completed at $(date)"
