name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  # ── Job 1: classify the changeset so we can skip heavy validation on
  # frontend-only patches (CSS/JS/HTML/docs). Saves ~2 minutes per deploy.
  # Fail-closed: any non-frontend touch flips needs_php_validation=true.
  classify:
    name: Classify Changeset
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      needs_php_validation: ${{ steps.classify.outputs.needs_php_validation }}
      needs_db_migration_check: ${{ steps.classify.outputs.needs_db_migration_check }}
      changed_files_summary: ${{ steps.classify.outputs.summary }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch enough history that `git diff <before> HEAD` resolves even
          # when a push lands several commits at once. github.event.before is
          # unreachable with a shallow depth-2 clone if >1 commit was pushed,
          # which previously made classify list the entire repo and (worse)
          # abort on a SIGPIPE. 0 = full history; cheap for this small repo
          # and unambiguously correct.
          fetch-depth: 0
      - id: classify
        name: Compute file class flags
        run: |
          set -euo pipefail
          BASE="${{ github.event.before }}"
          # Resolve a usable base commit. If github.event.before is empty,
          # all-zero, or not present in this clone, fall back to HEAD~1, and
          # if even that is missing, fail CLOSED (full validation).
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ] \
             || ! git cat-file -e "${BASE}^{commit}" 2>/dev/null; then
            if git cat-file -e 'HEAD~1^{commit}' 2>/dev/null; then
              BASE="HEAD~1"
            else
              BASE=""
            fi
          fi

          if [ -n "$BASE" ]; then
            CHANGED="$(git diff --name-only "$BASE" HEAD)"
          else
            # No resolvable base — cannot classify, so demand full validation.
            CHANGED=""
          fi

          # Display the changeset without a pipe to head (a closed head pipe
          # raises SIGPIPE in the writer, which under pipefail fails the step).
          FILE_COUNT="$(printf '%s' "$CHANGED" | grep -c '' || true)"
          echo "Changed files ($FILE_COUNT):"
          echo "$CHANGED" | awk 'NR<=50 {print "  " $0} NR==51 {print "  ... (truncated)"}'

          # Frontend-only allowlist. Anything NOT matching => needs PHP validation.
          # Empty changeset (unresolvable base) also => full validation.
          FRONTEND_REGEX='^(mom/(scripts|styles|templates|docs|assets)/|mom/portal\.html$|mom/index\.html$|.*\.(md|txt)$)'
          if [ -z "$CHANGED" ]; then
            PHP_TOUCH="unresolved-base"
            DB_TOUCH=""
          else
            PHP_TOUCH="$(echo "$CHANGED" | grep -Ev "$FRONTEND_REGEX" || true)"
            DB_TOUCH="$(echo "$CHANGED" | grep -E '^mom/database/migrations/.*\.sql$' || true)"
          fi

          if [ -z "$PHP_TOUCH" ]; then
            echo "needs_php_validation=false" >> "$GITHUB_OUTPUT"
            echo "summary=frontend-only ($FILE_COUNT files)" >> "$GITHUB_OUTPUT"
            echo "::notice::Frontend-only changeset — skipping PHPStan/PHPUnit/SSOT gates"
          else
            echo "needs_php_validation=true" >> "$GITHUB_OUTPUT"
            NON_FE="$(echo "$PHP_TOUCH" | grep -c '' || true)"
            echo "summary=full ($FILE_COUNT files, $NON_FE non-frontend)" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "$DB_TOUCH" ]; then
            echo "needs_db_migration_check=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_db_migration_check=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: classify
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          # Need 2 commits so the runtime-files diff can compare against the
          # previous SHA. fetch-depth: 0 would also work but is heavier.
          fetch-depth: 2
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer:v2

      - name: Show classification
        run: |
          echo "Changeset class: ${{ needs.classify.outputs.changed_files_summary }}"
          echo "PHP validation:  ${{ needs.classify.outputs.needs_php_validation }}"
          echo "Migration check: ${{ needs.classify.outputs.needs_db_migration_check }}"

      - name: Refuse runtime config / docs in commit
        # Hard gate: even if the deploy.sh capture/restore would catch this
        # at runtime, we don't want runtime data flowing through git history
        # at all. ISO ALCOA+ "Original" requires changes to live data go
        # through data-push.sh with a change-ref, not a code commit.
        run: |
          set -euo pipefail
          # shellcheck source=tools/vps-setup/scripts/_runtime-files.sh
          . tools/vps-setup/scripts/_runtime-files.sh
          BASE="${{ github.event.before }}"
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            BASE="HEAD~1"
          fi
          DIFF="$(git diff --name-only "$BASE" HEAD || true)"
          OFFENDERS="$(printf '%s\n' "$DIFF" | grep -E "$RUNTIME_CONFIG_REGEX" || true)"
          if [ -n "$OFFENDERS" ]; then
            echo "::error::This push modifies runtime-mutated config files:" >&2
            echo "$OFFENDERS" | sed 's/^/  - /' >&2
            echo "" >&2
            echo "Runtime config must NOT travel through git." >&2
            echo "Use: bash tools/vps-setup/scripts/data-sync.sh" >&2
            echo "  or: bash tools/vps-setup/scripts/data-push.sh --change-ref CR-XXX" >&2
            exit 1
          fi

      - name: Verify runtime-files preserve list covers all PHP writers
        if: needs.classify.outputs.needs_php_validation == 'true'
        # If a developer added a new save_*() / saveConfig() / write_json_file()
        # call whose path resolves under mom/data/config/ but didn't add the
        # basename to RUNTIME_CONFIG_FILES in _runtime-files.sh, the next
        # deploy will silently clobber that file. Catch it here, before SSH.
        run: php tools/vps-setup/scripts/audit-runtime-files.php

      - name: Block generated/runtime artifacts in controlled source
        run: php mom/tools/release/check_repo_boundary.php

      - name: RACI integrity check (ANNEX-121 SSOT)
        # Runs unconditionally — RACI changes are doc-only changesets that the
        # classify job marks frontend-only, so this must not be gated behind
        # needs_php_validation. Validates one-A-per-row, >=1 R, valid letters,
        # 15-column shape, every CDR present in ANNEX-120, and the ANNEX-120↔121
        # accountability cross-check.
        run: php mom/tools/release/check_raci_integrity.php

      - name: Migration drift check (offline)
        # Catches the 188_error_code_registry repeat: live DB applied a
        # migration whose file was deleted from the repo, so fresh clones
        # can't recreate the schema. Offline mode runs file-level checks
        # only; full DB cross-check runs inside deploy.sh on the VPS.
        if: needs.classify.outputs.needs_db_migration_check == 'true'
        run: php mom/tools/release/check_migration_drift.php

      - name: Enforce user identity SSOT (.ai/USER_IDENTITY_SSOT.md)
        if: needs.classify.outputs.needs_php_validation == 'true'
        # Fails the deploy if any code path: (a) hardcodes role-key literals
        # outside the ROLES owner files, (b) creates a new table with
        # username/full_name/employee_name/password_hash outside the existing
        # user-identity tables, (c) writes directly to users/employees/
        # hcm_employees outside AuthUserShadowSyncService, or (d) calls
        # file_put_contents() against users.json outside DataSyncMutationService.
        run: php mom/tools/release/check_user_identity_ssot.php

      - name: Cache Composer dependencies
        if: needs.classify.outputs.needs_php_validation == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache
            mom/vendor
          key: ${{ runner.os }}-php85-composer-${{ hashFiles('mom/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php85-composer-

      - name: Install validation dependencies
        if: needs.classify.outputs.needs_php_validation == 'true'
        working-directory: mom
        run: composer install --no-interaction --prefer-dist

      - name: Cache PHPStan result cache
        if: needs.classify.outputs.needs_php_validation == 'true'
        # PHPStan writes an incremental result cache to mom/.phpstan-cache
        # (tmpDir in phpstan.neon). Restoring it lets PHPStan re-analyse only
        # the files changed since the last run — a full ~135s analyse drops
        # to ~20-40s. Keyed by sha so each run saves a fresh copy; restore-keys
        # falls back to the most recent prior cache.
        uses: actions/cache@v4
        with:
          path: mom/.phpstan-cache
          key: ${{ runner.os }}-phpstan-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-phpstan-

      # Split into 3 steps so the GitHub Actions UI shows EXACTLY which gate
      # fails. Previously bundled into one step where a phpunit failure
      # looked identical to a phpstan failure looked identical to a
      # workflow-status-authority failure.
      - name: Validate — phpstan analyse
        if: needs.classify.outputs.needs_php_validation == 'true'
        working-directory: mom
        env: { APP_ENV: test, DB_PASSWORD: test_password }
        run: composer analyse -- --memory-limit=1G

      - name: Validate — phpunit tests
        if: needs.classify.outputs.needs_php_validation == 'true'
        working-directory: mom
        env: { APP_ENV: test, DB_PASSWORD: test_password }
        run: composer test

      - name: Validate — workflow status authority
        if: needs.classify.outputs.needs_php_validation == 'true'
        working-directory: mom
        env: { APP_ENV: test, DB_PASSWORD: test_password }
        run: php tools/release/check_workflow_status_authority.php

      - name: Verify governed promotion inputs (when configured)
        if: needs.classify.outputs.needs_php_validation == 'true'
        env:
          RELEASE_MANIFEST_REF: ${{ vars.RELEASE_MANIFEST_REF }}
          CHANGE_AUTHORITY_REF: ${{ vars.CHANGE_AUTHORITY_REF }}
          DEPLOY_COMMIT_SHA: ${{ github.sha }}
        run: |
          # Pre-production posture (per ADR-0001): controlled-source promotion
          # via release manifest is OPTIONAL until the production cutover.
          if [ -n "$RELEASE_MANIFEST_REF" ] && [ -n "$CHANGE_AUTHORITY_REF" ]; then
            php mom/tools/release/verify_release_manifest_binding.php \
              --manifest-ref="$RELEASE_MANIFEST_REF" \
              --change-authority-ref="$CHANGE_AUTHORITY_REF" \
              --commit-sha="$DEPLOY_COMMIT_SHA"
          else
            echo "::warning::RELEASE_MANIFEST_REF / CHANGE_AUTHORITY_REF unset — proceeding without manifest binding verification (pre-production posture)."
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # Requires the SSH user to have a NOPASSWD sudo rule for the deploy
          # script. `sudo -n` fails fast if NOPASSWD is missing.
          script: |
            set -euo pipefail
            sudo -n bash ${{ secrets.DEPLOY_PATH }}/tools/vps-setup/scripts/deploy.sh
            echo "Deploy completed at $(date)"
