name: HMV4 prototype E2E

# Manual/nightly evidence workflow for the module-template-v4 (HMV4) prototype.
# Normal PR path gating lives in .github/workflows/ci.yml to avoid duplicate E2E.

on:
  workflow_dispatch:
    inputs:
      full_e2e:
        description: Force Playwright E2E
        required: false
        default: true
        type: boolean
      visual_e2e:
        description: Run visual evidence
        required: false
        default: true
        type: boolean
  schedule:
    - cron: '47 18 * * *'

permissions:
  contents: read

concurrency:
  group: hmv4-e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  HMV4_PREVIEW_ENABLED: 'false'
  HMV4_FIXTURE_MODE: 'false'

jobs:
  classify:
    name: Classify HMV4 Changeset
    runs-on: ubuntu-latest
    outputs:
      changed_files: ${{ steps.classify.outputs.changed_files }}
      file_count: ${{ steps.classify.outputs.file_count }}
      is_full_required: ${{ steps.classify.outputs.is_full_required }}
      full_required_reason: ${{ steps.classify.outputs.full_required_reason }}
      needs_hmv4_safety: ${{ steps.classify.outputs.needs_hmv4_safety }}
      needs_playwright_e2e: ${{ steps.classify.outputs.needs_playwright_e2e }}
      needs_visual_e2e: ${{ steps.classify.outputs.needs_visual_e2e }}
      summary: ${{ steps.classify.outputs.summary }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: classify
        name: Compute HMV4 flags
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: tools/scripts/ci/smart-classify.sh

  safety-checks:
    name: HMV4 safety checks
    runs-on: ubuntu-latest
    needs: classify
    if: ${{ always() && !failure() && (needs.classify.outputs.needs_hmv4_safety == 'true' || needs.classify.outputs.is_full_required == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule') }}
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Node syntax check HMV4 70-74
        run: |
          set -euo pipefail
          for f in 70-module-template-v4-hydration 71-module-template-v4-routes \
                   72-module-template-v4-bridge 73-module-template-v4-renderers \
                   74-module-template-v4-fixtures; do
            node --check "mom/scripts/portal/$f.js"
            echo "PASS $f.js"
          done

      - name: JSON fixture parse
        run: |
          python3 - <<'PY'
          import json, pathlib, sys
          errors = 0
          for p in pathlib.Path('tests/fixtures/module-template-v4').rglob('*.json'):
              try:
                  json.loads(p.read_text())
                  print('PASS', p.name)
              except Exception as e:
                  errors += 1
                  print('FAIL', p, e)
          sys.exit(0 if errors == 0 else 1)
          PY

      - name: Fixture production-load guard
        run: |
          set -euo pipefail
          if grep -n "74-module-template-v4-fixtures" mom/portal.html; then
            echo "FAIL fixture production load detected in mom/portal.html"
            exit 1
          fi
          echo "PASS no fixture production load"

      - name: Forbidden diff guard
        run: |
          set -euo pipefail
          BASE="${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}"
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "${BASE}^{commit}" 2>/dev/null; then
            BASE="origin/main"
          fi
          DIFF="$(git diff --name-only "$BASE" HEAD || true)"
          HMV4_DIFF="$(printf '%s\n' "$DIFF" | grep -E '^mom/scripts/portal/7[0-4]-module-template-v4-.*\.js$|^mom/styles/module-template-v4|^tests/fixtures/module-template-v4/|^tests/e2e/|(^|/)playwright\.config\.(ts|js)$' || true)"
          if [ -z "$HMV4_DIFF" ]; then
            echo "PASS forbidden diff (no HMV4 slice files changed)"
            exit 0
          fi
          if printf '%s\n' "$DIFF" | grep -E 'mom/styles/(portal\.main|eqms-suite|density-darkmode)\.css|mom/scripts/portal/(01-module-router|02-state-auth-ui|40-eqms-shell)\.js'; then
            echo "FAIL forbidden file modified in slice diff"
            exit 1
          fi
          echo "PASS forbidden diff"

      - name: Graphics Authority basic JS check
        run: |
          set -euo pipefail
          if grep -nE '#[0-9a-fA-F]{6}\b' mom/scripts/portal/7[0-4]-module-template-v4-*.js \
              | grep -vE '\s*//' | grep -vE '\s*\*'; then
            echo "FAIL hardcoded hex colors detected in HMV4 component JS"
            exit 1
          fi
          echo "PASS no hardcoded hex in HMV4 component JS"

  e2e:
    name: HMV4 Playwright E2E Chromium
    runs-on: ubuntu-latest
    needs: [classify, safety-checks]
    if: ${{ always() && !failure() && (needs.classify.outputs.needs_playwright_e2e == 'true' || needs.classify.outputs.is_full_required == 'true' || (github.event_name == 'workflow_dispatch' && inputs.full_e2e) || github.event_name == 'schedule') }}
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup PHP 8.2 for built-in server
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Cache Playwright npm dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            tests/e2e/node_modules
          key: ${{ runner.os }}-hmv4-e2e-${{ hashFiles('tests/e2e/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-hmv4-e2e-

      - name: Install Playwright deps
        working-directory: tests/e2e
        run: |
          npm ci
          ./node_modules/.bin/playwright install chromium --with-deps

      - name: Run HMV4 E2E Chromium
        working-directory: tests/e2e
        run: npm run test:hmv4:ci -- --reporter=list

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: tests/e2e/.codex-playwright/
          retention-days: 7
          if-no-files-found: ignore

  visual-e2e:
    name: HMV4 Visual Regression Evidence
    runs-on: ubuntu-latest
    needs: [classify, safety-checks]
    if: ${{ always() && !failure() && (needs.classify.outputs.needs_visual_e2e == 'true' || needs.classify.outputs.is_full_required == 'true' || github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (inputs.visual_e2e || inputs.full_e2e))) }}
    timeout-minutes: 12
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup PHP 8.2 for built-in server
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Cache Playwright npm dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            tests/e2e/node_modules
          key: ${{ runner.os }}-hmv4-e2e-${{ hashFiles('tests/e2e/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-hmv4-e2e-

      - name: Install Playwright deps
        working-directory: tests/e2e
        run: |
          npm ci
          ./node_modules/.bin/playwright install chromium --with-deps

      - name: Run HMV4 visual regression Chromium
        working-directory: tests/e2e
        run: npm run test:visual -- --reporter=list --max-failures=25

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: hmv4-visual-report-${{ github.run_id }}
          path: tests/e2e/.codex-playwright/
          retention-days: 7
          if-no-files-found: ignore

  summary:
    name: HMV4 E2E Summary
    runs-on: ubuntu-latest
    needs: [classify, safety-checks, e2e, visual-e2e]
    if: always()
    steps:
      - name: Summarize HMV4 decision
        run: |
          set -euo pipefail
          echo "summary: ${{ needs.classify.outputs.summary }}"
          echo "full reason: ${{ needs.classify.outputs.full_required_reason }}"
          echo "safety-checks: ${{ needs.safety-checks.result }}"
          echo "e2e: ${{ needs.e2e.result }}"
          echo "visual-e2e: ${{ needs.visual-e2e.result }}"
          for result in '${{ needs.classify.result }}' '${{ needs.safety-checks.result }}' '${{ needs.e2e.result }}'; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "FAIL: HMV4 workflow gate failed or was cancelled." >&2
              exit 1
            fi
          done
