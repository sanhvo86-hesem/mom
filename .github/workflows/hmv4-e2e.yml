name: HMV4 prototype E2E

# This workflow validates the module-template-v4 (HMV4) prototype slice
# program. It runs on every push to a codex/* branch and on PRs to main.
#
# Scope:
# - Static safety checks (Node syntax, JSON parse, forbidden diff,
#   fixture production-load guard).
# - Playwright Chromium E2E suite.
#
# Activation policy: This workflow file is committed but disabled by
# default at the GitHub Actions UI level until an explicit governance
# decision activates it. To activate, an admin must enable workflows
# under Settings → Actions → "Allow all actions and reusable workflows".

on:
  push:
    branches:
      - 'codex/**'
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hmv4-e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  HMV4_PREVIEW_ENABLED: 'false'
  HMV4_FIXTURE_MODE: 'false'

jobs:
  safety-checks:
    name: HMV4 safety checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Node syntax check (HMV4 70-74)
        run: |
          set -e
          for f in 70-module-template-v4-hydration 71-module-template-v4-routes \
                   72-module-template-v4-bridge 73-module-template-v4-renderers \
                   74-module-template-v4-fixtures; do
            node --check "mom/scripts/portal/$f.js"
            echo "PASS $f.js"
          done

      - name: JSON fixture parse
        run: |
          python3 - <<'PY'
          import json, pathlib, sys
          errors = 0
          for p in pathlib.Path('tests/fixtures/module-template-v4').rglob('*.json'):
              try:
                  json.loads(p.read_text())
                  print('PASS', p.name)
              except Exception as e:
                  errors += 1
                  print('FAIL', p, e)
          sys.exit(0 if errors == 0 else 1)
          PY

      - name: Fixture production-load guard
        run: |
          if grep -n "74-module-template-v4-fixtures" mom/portal.html; then
            echo "FAIL fixture production load detected in mom/portal.html"
            exit 1
          fi
          echo "PASS no fixture production load"

      - name: Forbidden diff guard
        run: |
          set -e
          DIFF=$(git diff --name-only origin/main..HEAD || git diff --name-only HEAD~1 HEAD || true)
          if echo "$DIFF" | grep -E 'mom/styles/(portal\.main|eqms-suite|density-darkmode)\.css|mom/scripts/portal/(01-module-router|02-state-auth-ui|40-eqms-shell)\.js'; then
            echo "FAIL forbidden file modified in slice diff"
            exit 1
          fi
          echo "PASS forbidden diff"

      - name: Graphics Authority basic JS check
        run: |
          set -e
          # Hex colors in HMV4 component JS are forbidden (excluding comments).
          if grep -nE '#[0-9a-fA-F]{6}\b' mom/scripts/portal/7[0-4]-module-template-v4-*.js \
              | grep -vE '\s*//' | grep -vE '\s*\*'; then
            echo "FAIL hardcoded hex colors detected in HMV4 component JS"
            exit 1
          fi
          echo "PASS no hardcoded hex in HMV4 component JS"

  e2e:
    name: HMV4 Playwright E2E (Chromium)
    runs-on: ubuntu-latest
    needs: safety-checks
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup PHP 8.2 for built-in server
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install Playwright deps
        working-directory: tests/e2e
        run: |
          npm install --no-package-lock
          ./node_modules/.bin/playwright install chromium --with-deps

      - name: Run HMV4 E2E (Chromium)
        working-directory: tests/e2e
        run: |
          ./node_modules/.bin/playwright test --project=chromium --reporter=list

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            .codex-playwright/
            tests/e2e/test-results/
          retention-days: 7
          if-no-files-found: ignore
