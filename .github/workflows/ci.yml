name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  repo-boundary:
    name: Controlled Source Boundary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
      - name: Block generated/runtime artifacts in controlled source
        run: php mom/tools/release/check_repo_boundary.php

  lint:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    needs: repo-boundary
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
      - name: Check PHP syntax
        run: find mom/api mom/database -name "*.php" -print0 | xargs -0 -n1 php -l

  analyse:
    name: Static Analysis (PHPStan)
    runs-on: ubuntu-latest
    needs: repo-boundary
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo, pdo_pgsql, mbstring, json
          tools: composer:v2
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache
            mom/vendor
          key: ${{ runner.os }}-php85-composer-${{ hashFiles('mom/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php85-composer-
      - name: Install dependencies
        working-directory: mom
        run: composer install --no-interaction --prefer-dist
      - name: Cache PHPStan result cache
        uses: actions/cache@v4
        with:
          path: mom/.phpstan-cache
          key: ${{ runner.os }}-phpstan-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-phpstan-
      - name: Run PHPStan
        working-directory: mom
        run: vendor/bin/phpstan analyse --error-format=github

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: repo-boundary
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mom_test
          POSTGRES_USER: mom_app
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo, pdo_pgsql, mbstring, json, redis
          coverage: xdebug
      - name: Install dependencies
        working-directory: mom
        run: composer install --no-interaction --prefer-dist
      - name: Run PHPUnit
        working-directory: mom
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: mom_test
          DB_USER: mom_app
          DB_PASS: test_password
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: vendor/bin/phpunit --testdox

  openapi:
    name: OpenAPI Validation
    runs-on: ubuntu-latest
    needs: repo-boundary
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install spectral
        run: npm install -g @stoplight/spectral-cli
      - name: Validate OpenAPI spec
        run: spectral lint mom/api/openapi.yaml --fail-severity warn

  doc-health:
    name: Doc Health (links + DCC audit)
    runs-on: ubuntu-latest
    needs: repo-boundary
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
      - name: Broken-refs gate
        run: python3 scripts/doc-broken-refs-scan.py mom/docs --max-broken 0
      - name: Actor-link gate
        run: python3 scripts/doc-actor-links-scan.py mom/docs --max-unlinked 0 --max-nested 0 --max-unknown 0
      - name: DCC header audit (compliant-count regression gate)
        # Asserts ≥389 of 390 HTML docs satisfy the DCC pattern. Baseline 389
        # accommodates the one pre-existing fragment template
        # (mom/docs/training/templates/certificate-template.html — no <head>).
        # If a new doc fails to add a DCC header, this drops compliance and
        # the gate fails. Bump the baseline only when intentionally retiring
        # the certificate-template fix-up.
        run: |
          OUT="$(php mom/tools/dcc-batch/audit.php 2>&1 || true)"
          echo "$OUT"
          COMPLIANT=$(echo "$OUT" | awk -F: '/Fully compliant/{gsub(/ /,"",$2); print $2; exit}')
          if [ -z "$COMPLIANT" ]; then
            echo "FAIL: could not parse 'Fully compliant' from audit output." >&2
            exit 1
          fi
          if [ "$COMPLIANT" -lt 389 ]; then
            echo "FAIL: DCC compliance ($COMPLIANT) dropped below baseline (389)." >&2
            exit 1
          fi
          echo "PASS: DCC compliance $COMPLIANT ≥ 389."
