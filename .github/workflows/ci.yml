name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]
  workflow_dispatch:
    inputs:
      full_regression:
        description: Run full Smart CI regression
        required: false
        default: true
        type: boolean
      full_e2e:
        description: Force Playwright E2E
        required: false
        default: false
        type: boolean
      visual_e2e:
        description: Force visual E2E evidence
        required: false
        default: false
        type: boolean
      visual_required:
        description: Fail CI Summary if visual evidence fails
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '31 18 * * *'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/codex/') }}

jobs:
  classify:
    name: Classify Changeset
    runs-on: ubuntu-latest
    outputs:
      changed_files: ${{ steps.classify.outputs.changed_files }}
      file_count: ${{ steps.classify.outputs.file_count }}
      is_full_required: ${{ steps.classify.outputs.is_full_required }}
      full_required_reason: ${{ steps.classify.outputs.full_required_reason }}
      needs_repo_boundary: ${{ steps.classify.outputs.needs_repo_boundary }}
      needs_php_syntax: ${{ steps.classify.outputs.needs_php_syntax }}
      needs_phpstan: ${{ steps.classify.outputs.needs_phpstan }}
      needs_phpunit: ${{ steps.classify.outputs.needs_phpunit }}
      needs_kpi_tests: ${{ steps.classify.outputs.needs_kpi_tests }}
      needs_db_migration_check: ${{ steps.classify.outputs.needs_db_migration_check }}
      needs_openapi: ${{ steps.classify.outputs.needs_openapi }}
      needs_doc_light: ${{ steps.classify.outputs.needs_doc_light }}
      needs_doc_health: ${{ steps.classify.outputs.needs_doc_health }}
      needs_raci: ${{ steps.classify.outputs.needs_raci }}
      needs_frontend_safety: ${{ steps.classify.outputs.needs_frontend_safety }}
      needs_frontend_js_safety: ${{ steps.classify.outputs.needs_frontend_js_safety }}
      needs_frontend_static_safety: ${{ steps.classify.outputs.needs_frontend_static_safety }}
      needs_graphics_safety: ${{ steps.classify.outputs.needs_graphics_safety }}
      needs_hmv4_safety: ${{ steps.classify.outputs.needs_hmv4_safety }}
      needs_portal_runtime_smoke: ${{ steps.classify.outputs.needs_portal_runtime_smoke }}
      needs_playwright_e2e: ${{ steps.classify.outputs.needs_playwright_e2e }}
      needs_visual_e2e: ${{ steps.classify.outputs.needs_visual_e2e }}
      needs_security_light: ${{ steps.classify.outputs.needs_security_light }}
      needs_actionlint: ${{ steps.classify.outputs.needs_actionlint }}
      needs_classifier_selftest: ${{ steps.classify.outputs.needs_classifier_selftest }}
      needs_full_regression: ${{ steps.classify.outputs.needs_full_regression }}
      summary: ${{ steps.classify.outputs.summary }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Fetch immutable base for classifier
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha != '' }}
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          if ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            git fetch --no-tags --depth=1 origin "$BASE_SHA"
          fi
      - id: classify
        name: Compute Smart CI flags
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          SMART_CI_FULL_REASON: ${{ github.event_name == 'workflow_dispatch' && inputs.full_regression && 'workflow-dispatch' || '' }}
        run: tools/scripts/ci/smart-classify.sh

  actionlint:
    name: GitHub Actions Lint
    runs-on: ubuntu-latest
    needs: classify
    if: ${{ always() && !failure() && needs.classify.outputs.needs_actionlint == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: Run pinned actionlint for all workflows
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD:/repo" -w /repo rhysd/actionlint:1.7.7 .github/workflows/*.yml

  classifier-selftest:
    name: Smart Classifier Self-test
    runs-on: ubuntu-latest
    needs: classify
    if: ${{ always() && !failure() && needs.classify.outputs.needs_classifier_selftest == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: Run Smart CI path matrix self-test
        run: |
          bash tools/scripts/ci/test-smart-classify.sh
          bash tools/scripts/ci/audit-smart-ci-performance.sh

  branch-protection-audit:
    name: Branch Protection Audit
    runs-on: ubuntu-latest
    needs: classify
    if: ${{ always() && !failure() && (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || needs.classify.outputs.needs_full_regression == 'true') }}
    steps:
      - uses: actions/checkout@v4
      - name: Verify main branch protection requires CI Summary
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        run: tools/scripts/ci/verify-branch-protection.sh

  repo-boundary:
    name: Controlled Source Boundary
    runs-on: ubuntu-latest
    needs: classify
    if: ${{ always() && needs.classify.outputs.needs_repo_boundary == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
      - name: Block generated/runtime artifacts in controlled source
        run: php mom/tools/release/check_repo_boundary.php

  php-syntax:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    needs: classify
    if: ${{ always() && !failure() && needs.classify.outputs.needs_php_syntax == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
      - name: Check PHP syntax
        run: find mom/api mom/database mom/tools -name "*.php" -print0 | xargs -0 -n1 php -l

  phpstan:
    name: Static Analysis PHPStan
    runs-on: ubuntu-latest
    needs: classify
    if: ${{ always() && !failure() && needs.classify.outputs.needs_phpstan == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo, pdo_pgsql, mbstring, json
          tools: composer:v2
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache
            mom/vendor
          key: ${{ runner.os }}-php85-composer-${{ hashFiles('mom/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php85-composer-
      - name: Install dependencies
        working-directory: mom
        run: composer install --no-interaction --prefer-dist
      - name: Cache PHPStan result cache
        uses: actions/cache@v4
        with:
          path: mom/.phpstan-cache
          key: ${{ runner.os }}-phpstan-${{ hashFiles('mom/composer.lock', 'mom/phpstan.neon') }}
          restore-keys: |
            ${{ runner.os }}-phpstan-
      - name: Run PHPStan
        working-directory: mom
        run: vendor/bin/phpstan analyse --error-format=github --memory-limit=1G

  phpunit:
    name: PHPUnit Tests
    runs-on: ubuntu-latest
    needs: classify
    if: ${{ always() && !failure() && needs.classify.outputs.needs_phpunit == 'true' }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mom_test
          POSTGRES_USER: mom_app
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo, pdo_pgsql, mbstring, json, redis
          coverage: none
          tools: composer:v2
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache
            mom/vendor
          key: ${{ runner.os }}-php85-composer-${{ hashFiles('mom/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php85-composer-
      - name: Install dependencies
        working-directory: mom
        run: composer install --no-interaction --prefer-dist
      - name: Run PHPUnit
        working-directory: mom
        env:
          APP_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: mom_test
          DB_USER: mom_app
          DB_PASS: test_password
          DB_PASSWORD: test_password
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: php -d memory_limit=1G vendor/bin/phpunit --testdox

  kpi-guard:
    name: KPI Guard
    runs-on: ubuntu-latest
    needs: classify
    if: ${{ always() && !failure() && needs.classify.outputs.needs_kpi_tests == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
      - name: KPI integrity check
        run: php mom/tools/release/check_kpi_integrity.php
      - name: KPI integrity drift self-test
        run: php mom/tools/release/check_kpi_integrity_drift_test.php

  db-migration-check:
    name: DB Migration Check
    runs-on: ubuntu-latest
    needs: classify
    if: ${{ always() && !failure() && needs.classify.outputs.needs_db_migration_check == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
      - name: Offline migration drift check
        run: php mom/tools/release/check_migration_drift.php
      - name: New migration numbers unique against main
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          MIGRATION_DIR="mom/database/migrations"
          BASE="${BASE_SHA:-}"
          if [ -n "$BASE" ] && [ "$BASE" != "0000000000000000000000000000000000000000" ] && ! git cat-file -e "${BASE}^{commit}" 2>/dev/null; then
            git fetch --no-tags --depth=1 origin "$BASE" || true
          fi
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "${BASE}^{commit}" 2>/dev/null; then
            if [ "$EVENT_NAME" = "pull_request" ]; then
              echo "::error::Unable to resolve immutable pull request base SHA for migration uniqueness check."
              exit 1
            fi
            if git cat-file -e 'HEAD~1^{commit}' 2>/dev/null; then
              BASE="HEAD~1"
            else
              echo "::warning::No event base SHA or HEAD~1 available; falling back to origin/main for non-PR migration uniqueness check."
              git fetch --no-tags --depth=1 origin main
              BASE="origin/main"
            fi
          fi
          echo "Migration uniqueness base: $BASE"
          NEW_FILES="$(git diff --name-only --diff-filter=A "$BASE"...HEAD -- "$MIGRATION_DIR/*.sql" || true)"
          if [ -z "$NEW_FILES" ]; then
            echo "No new migration files in this changeset."
            exit 0
          fi
          BRANCH_NUMS="$(printf '%s\n' "$NEW_FILES" | xargs -n1 basename | grep -oE '^[0-9]+' | sort || true)"
          DUP_BRANCH_NUMS="$(printf '%s\n' "$BRANCH_NUMS" | uniq -d || true)"
          if [ -n "$DUP_BRANCH_NUMS" ]; then
            echo "::error::Duplicate migration number(s) inside changeset: $DUP_BRANCH_NUMS"
            exit 1
          fi
          BASE_NUMS="$(git ls-tree -r --name-only "$BASE" -- "$MIGRATION_DIR" | xargs -n1 basename | grep -oE '^[0-9]+' | sort -u || true)"
          for f in $NEW_FILES; do
            NUM="$(basename "$f" | grep -oE '^[0-9]+')"
            if printf '%s\n' "$BASE_NUMS" | grep -qx "$NUM"; then
              echo "::error::Migration number $NUM in $f already exists on immutable base $BASE."
              exit 1
            fi
          done
          echo "PASS: All new migration numbers are unique vs immutable base."

  openapi:
    name: OpenAPI Validation
    runs-on: ubuntu-latest
    needs: classify
    if: ${{ always() && !failure() && needs.classify.outputs.needs_openapi == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Cache pinned Spectral npm package
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-spectral-cli-6.15.0
      - name: Validate OpenAPI spec
        run: npx --yes @stoplight/spectral-cli@6.15.0 lint mom/api/openapi.yaml --fail-severity warn

  doc-health:
    name: Doc Health
    runs-on: ubuntu-latest
    needs: classify
    if: ${{ always() && !failure() && needs.classify.outputs.needs_doc_health == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
      - name: Broken-refs gate
        run: python3 scripts/doc-broken-refs-scan.py mom/docs --max-broken 0
      - name: Actor-link gate
        run: python3 scripts/doc-actor-links-scan.py mom/docs --max-unlinked 0 --max-nested 0 --max-unknown 0
      - name: DCC header audit
        run: |
          set -euo pipefail
          OUT="$(php mom/tools/dcc-batch/audit.php 2>&1 || true)"
          echo "$OUT"
          COMPLIANT="$(echo "$OUT" | awk -F: '/Fully compliant/{gsub(/ /,"",$2); print $2; exit}')"
          if [ -z "$COMPLIANT" ]; then
            echo "FAIL: could not parse 'Fully compliant' from audit output." >&2
            exit 1
          fi
          if [ "$COMPLIANT" -lt 389 ]; then
            echo "FAIL: DCC compliance ($COMPLIANT) dropped below baseline (389)." >&2
            exit 1
          fi

  doc-light:
    name: Doc Light
    runs-on: ubuntu-latest
    needs: classify
    if: ${{ always() && !failure() && needs.classify.outputs.needs_doc_light == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: Lightweight markdown sanity
        run: |
          set -euo pipefail
          cat > /tmp/changed-files <<'EOF'
          ${{ needs.classify.outputs.changed_files }}
          EOF
          python3 - <<'PY'
          import os
          import re
          import sys
          from pathlib import Path

          changed = [line.strip() for line in Path('/tmp/changed-files').read_text().splitlines() if line.strip()]
          docs = [
              p for p in changed
              if p == 'LICENSE'
              or re.match(r'^[^/]+\.md$', p)
              or re.match(r'^docs/.*\.md$', p)
          ]
          if not docs:
              print('No lightweight markdown files in this changeset.')
              sys.exit(0)

          conflict = re.compile(r'^(<<<<<<<|=======|>>>>>>>)', re.M)
          link = re.compile(r'(?<!!)\[[^\]]+\]\(([^)]+)\)')
          bad = []
          for rel in docs:
              path = Path(rel)
              if not path.exists():
                  bad.append(f'{rel}: file is missing')
                  continue
              text = path.read_text(encoding='utf-8', errors='ignore')
              if conflict.search(text):
                  bad.append(f'{rel}: unresolved conflict marker')
              if re.search(r'\b(TBD|TODO_PLACEHOLDER|FIXME_PLACEHOLDER)\b', text):
                  bad.append(f'{rel}: forbidden placeholder token')
              base = path.parent
              for target in link.findall(text):
                  target = target.strip()
                  if (
                      not target or target.startswith(('#', 'http://', 'https://', 'mailto:', 'tel:', 'data:'))
                      or target.startswith('<')
                  ):
                      continue
                  clean = target.split('#', 1)[0].split('?', 1)[0]
                  if not clean:
                      continue
                  candidate = (base / clean).resolve()
                  root = Path.cwd().resolve()
                  try:
                      candidate.relative_to(root)
                  except ValueError:
                      continue
                  if not candidate.exists():
                      bad.append(f'{rel}: broken relative markdown link -> {target}')

          if bad:
              print('Doc light failed:')
              print('\n'.join('  - ' + item for item in bad))
              sys.exit(1)
          print(f'Doc light clean ({len(docs)} file(s)).')
          PY

  raci-integrity:
    name: RACI Integrity
    runs-on: ubuntu-latest
    needs: classify
    if: ${{ always() && !failure() && needs.classify.outputs.needs_raci == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
      - name: RACI master integrity
        run: php mom/tools/release/check_raci_integrity.php
      - name: RACI derivative integrity
        run: php mom/tools/release/check_raci_derivatives.php
      - name: Decision threshold consistency
        run: php mom/tools/release/check_decision_threshold_consistency.php
      - name: RACI role registry coverage
        run: php mom/tools/release/check_role_registry_coverage.php
      - name: RACI forbidden placeholders
        run: php mom/tools/release/check_forbidden_placeholders.php
      - name: RACI scenario coverage
        run: php mom/tools/release/check_scenario_coverage.php
      - name: Workflow authority coverage
        run: php mom/tools/release/check_workflow_authority.php
      - name: Managed marker inventory
        run: php mom/tools/release/check_generated_marker_inventory.php
      - name: ISO reference status
        run: php mom/tools/release/check_iso_reference_status.php

  frontend-js-safety:
    name: Frontend JS Safety
    runs-on: ubuntu-latest
    needs: classify
    if: ${{ always() && !failure() && needs.classify.outputs.needs_frontend_js_safety == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Node syntax check for changed JS/MJS
        run: |
          set -euo pipefail
          cat > /tmp/changed-files <<'EOF'
          ${{ needs.classify.outputs.changed_files }}
          EOF
          JS_FILES="$(sed 's/^ *//' /tmp/changed-files | grep -E '^(mom/scripts|mom/assets)/.*\.js$|^mom/sw\.js$|^tools/scripts/.*\.(mjs|js)$' || true)"
          if [ -z "$JS_FILES" ]; then
            echo "No changed JS/MJS files require node --check."
          else
            printf '%s\n' "$JS_FILES" | while IFS= read -r f; do
              [ -f "$f" ] || continue
              node --check "$f"
            done
          fi
      - name: Targeted Blocks L3 smoke
        run: |
          set -euo pipefail
          cat > /tmp/changed-files <<'EOF'
          ${{ needs.classify.outputs.changed_files }}
          EOF
          if sed 's/^ *//' /tmp/changed-files | grep -qxE 'tools/scripts/smoke-blocks-l3-map\.mjs|mom/scripts/portal/00bh-blocks-facade\.js|mom/scripts/portal/00bi-blocks-l3-map\.js'; then
            node tools/scripts/smoke-blocks-l3-map.mjs
          else
            echo "Blocks L3 smoke not relevant for this changeset."
          fi
      - name: Lego token generator drift check
        run: |
          set -euo pipefail
          cat > /tmp/changed-files <<'EOF'
          ${{ needs.classify.outputs.changed_files }}
          EOF
          if sed 's/^ *//' /tmp/changed-files | grep -qxE 'tools/scripts/gen-lego-tokens\.mjs|tokens/lego\.tokens\.json|tokens/lego\.tokens\.generated\.json|mom/styles/lego-foundation\.css|mom/styles/lego-shell\.css'; then
            node tools/scripts/gen-lego-tokens.mjs --check
          else
            echo "Lego token generator check not relevant for this changeset."
          fi

  frontend-static-safety:
    name: Frontend Static Safety
    runs-on: ubuntu-latest
    needs: classify
    if: ${{ always() && !failure() && needs.classify.outputs.needs_frontend_static_safety == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: Static HTML/template sanity
        run: |
          set -euo pipefail
          cat > /tmp/changed-files <<'EOF'
          ${{ needs.classify.outputs.changed_files }}
          EOF
          python3 - <<'PY'
          import os
          import re
          import sys
          from html.parser import HTMLParser
          from pathlib import Path
          from urllib.parse import urlparse

          changed = [line.strip() for line in Path('/tmp/changed-files').read_text().splitlines() if line.strip()]
          targets = [
              p for p in changed
              if p in ('mom/portal.html', 'mom/index.html')
              or p.startswith('mom/templates/')
              or (p.startswith('mom/assets/') and p.endswith('.html'))
          ]
          if not targets:
              print('No static HTML/template files in this changeset.')
              sys.exit(0)

          class RefParser(HTMLParser):
              def __init__(self):
                  super().__init__(convert_charrefs=True)
                  self.scripts = []
                  self.refs = []
                  self.errors = []
              def handle_starttag(self, tag, attrs):
                  attrs = dict(attrs)
                  if tag == 'script' and attrs.get('src'):
                      self.scripts.append(attrs['src'])
                  for attr in ('href', 'src', 'action'):
                      if attrs.get(attr):
                          self.refs.append((tag, attr, attrs[attr]))
              def error(self, message):
                  self.errors.append(message)

          fixture_rx = re.compile(r'74-module-template-v4-fixtures|fixture-only', re.I)
          conflict_rx = re.compile(r'^(<<<<<<<|=======|>>>>>>>)', re.M)
          critical_portal_scripts = {
              '00-version-check.js',
              '00a-registry-service.js',
              '00bb-graphics-authority.js',
              '01-module-router.js',
              '02-state-auth-ui.js',
              '31-module-builder.js',
              '99-bootstrap.js',
          }
          bad = []

          def local_asset_exists(owner: Path, ref: str) -> bool:
              if not ref or ref.startswith(('#', 'mailto:', 'tel:', 'javascript:', 'data:', 'blob:')):
                  return True
              parsed = urlparse(ref)
              if parsed.scheme or parsed.netloc:
                  return True
              clean = parsed.path
              if not clean:
                  return True
              if clean.startswith('/mom/'):
                  candidate = Path('mom') / clean.removeprefix('/mom/')
              elif clean.startswith('/styles/'):
                  candidate = Path('mom') / clean.removeprefix('/')
              elif clean.startswith('/scripts/'):
                  candidate = Path('mom') / clean.removeprefix('/')
              elif clean.startswith('/assets/'):
                  candidate = Path('mom') / clean.removeprefix('/')
              elif clean.startswith('/') and not Path(clean).suffix:
                  return True
              elif clean.startswith('../'):
                  return True
              elif not Path(clean).suffix:
                  return True
              else:
                  candidate = owner.parent / clean
              return candidate.exists()

          for rel in targets:
              path = Path(rel)
              if not path.exists():
                  bad.append(f'{rel}: file is missing')
                  continue
              text = path.read_text(encoding='utf-8-sig', errors='ignore')
              if conflict_rx.search(text):
                  bad.append(f'{rel}: unresolved conflict marker')
              if fixture_rx.search(text):
                  bad.append(f'{rel}: fixture-only script/load detected')

              parser = RefParser()
              try:
                  parser.feed(text)
                  parser.close()
              except Exception as exc:
                  bad.append(f'{rel}: HTML parse failed: {exc}')

              scripts = [src.split('?', 1)[0].split('#', 1)[0] for src in parser.scripts]
              seen = {}
              for src in scripts:
                  seen[src] = seen.get(src, 0) + 1
              for src, count in sorted(seen.items()):
                  if count > 1 and ('scripts/portal/' in src or src.endswith('.js')):
                      bad.append(f'{rel}: duplicate script src {src}')

              if rel == 'mom/portal.html':
                  basenames = {Path(src).name for src in scripts}
                  missing = sorted(critical_portal_scripts - basenames)
                  if missing:
                      bad.append(f'{rel}: missing critical portal script(s): {", ".join(missing)}')

              for tag, attr, ref in parser.refs:
                  if not local_asset_exists(path, ref):
                      bad.append(f'{rel}: missing local {tag} {attr} target {ref}')

          if bad:
              print('Frontend static safety failed:')
              print('\n'.join('  - ' + item for item in bad))
              sys.exit(1)
          print(f'Frontend static safety clean ({len(targets)} file(s)).')
          PY

  graphics-safety:
    name: Graphics Safety
    runs-on: ubuntu-latest
    needs: classify
    if: ${{ always() && !failure() && needs.classify.outputs.needs_graphics_safety == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
      - name: Graphics no-hardcode gate
        run: php mom/tools/release/check_graphics_no_hardcode.php
      - name: Graphics block registry gate
        run: php mom/tools/release/check_graphics_block_registry.php
      - name: Graphics archetype registry gate
        run: php mom/tools/release/check_graphics_archetype_registry.php

  portal-runtime-smoke:
    name: Portal Runtime Smoke
    runs-on: ubuntu-latest
    needs: classify
    if: ${{ always() && !failure() && (needs.classify.outputs.needs_portal_runtime_smoke == 'true' || needs.classify.outputs.needs_full_regression == 'true') }}
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Smoke portal runtime contracts
        run: node tools/scripts/smoke-portal-runtime.mjs

  hmv4-safety:
    name: HMV4 Safety
    runs-on: ubuntu-latest
    needs: classify
    if: ${{ always() && !failure() && (needs.classify.outputs.needs_hmv4_safety == 'true' || needs.classify.outputs.needs_playwright_e2e == 'true' || needs.classify.outputs.needs_visual_e2e == 'true' || needs.classify.outputs.needs_full_regression == 'true' || github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (inputs.full_e2e || inputs.visual_e2e)) || (github.event_name == 'pull_request' && (contains(github.event.pull_request.labels.*.name, 'e2e') || contains(github.event.pull_request.labels.*.name, 'visual') || contains(github.event.pull_request.labels.*.name, 'full-ci')))) }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Node syntax check HMV4 70-74
        run: |
          set -euo pipefail
          for f in 70-module-template-v4-hydration 71-module-template-v4-routes \
                   72-module-template-v4-bridge 73-module-template-v4-renderers \
                   74-module-template-v4-fixtures; do
            node --check "mom/scripts/portal/$f.js"
            echo "PASS $f.js"
          done
      - name: JSON fixture parse
        run: |
          python3 - <<'PY'
          import json, pathlib, sys
          errors = 0
          for p in pathlib.Path('tests/fixtures/module-template-v4').rglob('*.json'):
              try:
                  json.loads(p.read_text())
                  print('PASS', p.name)
              except Exception as e:
                  errors += 1
                  print('FAIL', p, e)
          sys.exit(0 if errors == 0 else 1)
          PY
      - name: Fixture production-load guard
        run: |
          set -euo pipefail
          if grep -n "74-module-template-v4-fixtures" mom/portal.html; then
            echo "FAIL fixture production load detected in mom/portal.html"
            exit 1
          fi
          echo "PASS no fixture production load"
      - name: Forbidden diff guard
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          BASE="${BASE_SHA:-}"
          if [ -n "$BASE" ] && [ "$BASE" != "0000000000000000000000000000000000000000" ] && ! git cat-file -e "${BASE}^{commit}" 2>/dev/null; then
            git fetch --no-tags --depth=1 origin "$BASE" || true
          fi
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "${BASE}^{commit}" 2>/dev/null; then
            if [ "$EVENT_NAME" = "pull_request" ]; then
              echo "Unable to resolve immutable pull request base SHA for HMV4 forbidden diff guard."
              exit 1
            fi
            if git cat-file -e 'HEAD~1^{commit}' 2>/dev/null; then
              BASE="HEAD~1"
            else
              echo "::warning::Unable to resolve event base; falling back to origin/main for non-PR HMV4 diff guard."
              git fetch --no-tags --depth=1 origin main
              BASE="origin/main"
            fi
          fi
          echo "HMV4 forbidden diff base: $BASE"
          DIFF="$(git diff --name-only "$BASE" HEAD || true)"
          HMV4_DIFF="$(printf '%s\n' "$DIFF" | grep -E '^mom/scripts/portal/7[0-4]-module-template-v4-.*\.js$|^mom/styles/module-template-v4|^tests/fixtures/module-template-v4/|^tests/e2e/|(^|/)playwright\.config\.(ts|js)$' || true)"
          if [ -z "$HMV4_DIFF" ]; then
            echo "PASS forbidden diff (no HMV4 slice files changed)"
            exit 0
          fi
          if printf '%s\n' "$DIFF" | grep -E 'mom/styles/(portal\.main|eqms-suite|density-darkmode)\.css|mom/scripts/portal/(01-module-router|02-state-auth-ui|40-eqms-shell)\.js'; then
            echo "FAIL forbidden file modified in slice diff"
            exit 1
          fi
          echo "PASS forbidden diff"
      - name: Graphics Authority basic JS check
        run: |
          set -euo pipefail
          if grep -nE '#[0-9a-fA-F]{6}\b' mom/scripts/portal/7[0-4]-module-template-v4-*.js \
              | grep -vE '\s*//' | grep -vE '\s*\*'; then
            echo "FAIL hardcoded hex colors detected in HMV4 component JS"
            exit 1
          fi
          echo "PASS no hardcoded hex in HMV4 component JS"

  playwright-e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: [classify, hmv4-safety]
    if: ${{ always() && !failure() && (needs.classify.outputs.needs_playwright_e2e == 'true' || (github.event_name == 'workflow_dispatch' && inputs.full_e2e) || (github.event_name == 'pull_request' && (contains(github.event.pull_request.labels.*.name, 'e2e') || contains(github.event.pull_request.labels.*.name, 'full-ci')))) }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: Cache Playwright npm dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            tests/e2e/node_modules
          key: ${{ runner.os }}-hmv4-e2e-${{ hashFiles('tests/e2e/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-hmv4-e2e-
      - name: Install Playwright deps
        working-directory: tests/e2e
        run: |
          npm ci
          ./node_modules/.bin/playwright install chromium --with-deps
      - name: Run HMV4 E2E Chromium
        working-directory: tests/e2e
        run: npm run test:hmv4:ci -- --reporter=list
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: tests/e2e/.codex-playwright/
          retention-days: 7
          if-no-files-found: ignore

  hmv4-visual-e2e:
    name: HMV4 Visual Regression Evidence
    runs-on: ubuntu-latest
    needs: [classify, hmv4-safety]
    if: ${{ always() && !failure() && (needs.classify.outputs.needs_visual_e2e == 'true' || github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (inputs.visual_e2e || inputs.full_e2e)) || (github.event_name == 'pull_request' && (contains(github.event.pull_request.labels.*.name, 'visual') || contains(github.event.pull_request.labels.*.name, 'visual-required') || contains(github.event.pull_request.labels.*.name, 'full-ci')))) }}
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: Cache Playwright npm dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            tests/e2e/node_modules
          key: ${{ runner.os }}-hmv4-e2e-${{ hashFiles('tests/e2e/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-hmv4-e2e-
      - name: Install Playwright deps
        working-directory: tests/e2e
        run: |
          npm ci
          ./node_modules/.bin/playwright install chromium --with-deps
      - name: Run HMV4 visual regression Chromium
        working-directory: tests/e2e
        continue-on-error: ${{ !((github.event_name == 'workflow_dispatch' && inputs.visual_required) || (github.event_name == 'pull_request' && (contains(github.event.pull_request.labels.*.name, 'visual-required') || contains(github.event.pull_request.labels.*.name, 'full-ci')))) }}
        run: npm run test:visual -- --reporter=list --max-failures=25
      - name: Upload Playwright report on failure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hmv4-visual-report-${{ github.run_id }}
          path: tests/e2e/.codex-playwright/
          retention-days: 7
          if-no-files-found: ignore

  security-light:
    name: Security Light
    runs-on: ubuntu-latest
    needs: classify
    if: ${{ always() && !failure() && needs.classify.outputs.needs_security_light == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
      - name: User identity SSOT
        run: php mom/tools/release/check_user_identity_ssot.php
      - name: Authorization invariants
        run: php mom/tools/release/check_authorization_invariants.php

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs:
      - classify
      - actionlint
      - classifier-selftest
      - branch-protection-audit
      - repo-boundary
      - php-syntax
      - phpstan
      - phpunit
      - kpi-guard
      - db-migration-check
      - openapi
      - doc-light
      - doc-health
      - raci-integrity
      - frontend-js-safety
      - frontend-static-safety
      - graphics-safety
      - portal-runtime-smoke
      - hmv4-safety
      - playwright-e2e
      - hmv4-visual-e2e
      - security-light
    if: always()
    steps:
      - name: Summarize Smart CI decision and gate results
        run: |
          set -euo pipefail
          cat <<'EOF'
          Smart CI classifier
          -------------------
          changed files: ${{ needs.classify.outputs.file_count }}
          summary: ${{ needs.classify.outputs.summary }}
          full_required_reason: ${{ needs.classify.outputs.full_required_reason }}

          Flags
          | flag | value |
          |---|---|
          | is_full_required | ${{ needs.classify.outputs.is_full_required }} |
          | needs_repo_boundary | ${{ needs.classify.outputs.needs_repo_boundary }} |
          | needs_php_syntax | ${{ needs.classify.outputs.needs_php_syntax }} |
          | needs_phpstan | ${{ needs.classify.outputs.needs_phpstan }} |
          | needs_phpunit | ${{ needs.classify.outputs.needs_phpunit }} |
          | needs_kpi_tests | ${{ needs.classify.outputs.needs_kpi_tests }} |
          | needs_db_migration_check | ${{ needs.classify.outputs.needs_db_migration_check }} |
          | needs_openapi | ${{ needs.classify.outputs.needs_openapi }} |
          | needs_doc_light | ${{ needs.classify.outputs.needs_doc_light }} |
          | needs_doc_health | ${{ needs.classify.outputs.needs_doc_health }} |
          | needs_raci | ${{ needs.classify.outputs.needs_raci }} |
          | needs_frontend_safety | ${{ needs.classify.outputs.needs_frontend_safety }} |
          | needs_frontend_js_safety | ${{ needs.classify.outputs.needs_frontend_js_safety }} |
          | needs_frontend_static_safety | ${{ needs.classify.outputs.needs_frontend_static_safety }} |
          | needs_graphics_safety | ${{ needs.classify.outputs.needs_graphics_safety }} |
          | needs_hmv4_safety | ${{ needs.classify.outputs.needs_hmv4_safety }} |
          | needs_portal_runtime_smoke | ${{ needs.classify.outputs.needs_portal_runtime_smoke }} |
          | needs_playwright_e2e | ${{ needs.classify.outputs.needs_playwright_e2e }} |
          | needs_visual_e2e | ${{ needs.classify.outputs.needs_visual_e2e }} |
          | needs_security_light | ${{ needs.classify.outputs.needs_security_light }} |
          | needs_actionlint | ${{ needs.classify.outputs.needs_actionlint }} |
          | needs_classifier_selftest | ${{ needs.classify.outputs.needs_classifier_selftest }} |
          | needs_full_regression | ${{ needs.classify.outputs.needs_full_regression }} |

          Jobs
          | job | result |
          |---|---|
          | classify | ${{ needs.classify.result }} |
          | actionlint | ${{ needs.actionlint.result }} |
          | classifier-selftest | ${{ needs.classifier-selftest.result }} |
          | branch-protection-audit | ${{ needs.branch-protection-audit.result }} |
          | repo-boundary | ${{ needs.repo-boundary.result }} |
          | php-syntax | ${{ needs.php-syntax.result }} |
          | phpstan | ${{ needs.phpstan.result }} |
          | phpunit | ${{ needs.phpunit.result }} |
          | kpi-guard | ${{ needs.kpi-guard.result }} |
          | db-migration-check | ${{ needs.db-migration-check.result }} |
          | openapi | ${{ needs.openapi.result }} |
          | doc-light | ${{ needs.doc-light.result }} |
          | doc-health | ${{ needs.doc-health.result }} |
          | raci-integrity | ${{ needs.raci-integrity.result }} |
          | frontend-js-safety | ${{ needs.frontend-js-safety.result }} |
          | frontend-static-safety | ${{ needs.frontend-static-safety.result }} |
          | graphics-safety | ${{ needs.graphics-safety.result }} |
          | portal-runtime-smoke | ${{ needs.portal-runtime-smoke.result }} |
          | hmv4-safety | ${{ needs.hmv4-safety.result }} |
          | playwright-e2e | ${{ needs.playwright-e2e.result }} |
          | hmv4-visual-e2e | ${{ needs.hmv4-visual-e2e.result }} |
          | security-light | ${{ needs.security-light.result }} |
          EOF

          echo
          echo "Critical path class"
          lane="backend"
          if [ '${{ needs.classify.outputs.needs_full_regression }}' = 'true' ]; then lane="full"; fi
          if [ '${{ needs.classify.outputs.needs_doc_light }}' = 'true' ] && [ '${{ needs.classify.outputs.needs_doc_health }}' = 'false' ]; then lane="docs-light"; fi
          if [ '${{ needs.classify.outputs.needs_doc_health }}' = 'true' ] && [ '${{ needs.classify.outputs.needs_phpstan }}' = 'false' ] && [ '${{ needs.classify.outputs.needs_phpunit }}' = 'false' ]; then lane="docs-full"; fi
          if [ '${{ needs.classify.outputs.needs_graphics_safety }}' = 'true' ] && [ '${{ needs.classify.outputs.needs_phpstan }}' = 'false' ] && [ '${{ needs.classify.outputs.needs_phpunit }}' = 'false' ]; then lane="graphics-fast"; fi
          if [ '${{ needs.classify.outputs.needs_frontend_js_safety }}' = 'true' ] && [ '${{ needs.classify.outputs.needs_graphics_safety }}' = 'false' ] && [ '${{ needs.classify.outputs.needs_phpstan }}' = 'false' ] && [ '${{ needs.classify.outputs.needs_phpunit }}' = 'false' ]; then lane="frontend-js-fast"; fi
          if [ '${{ needs.classify.outputs.needs_frontend_static_safety }}' = 'true' ] && [ '${{ needs.classify.outputs.needs_phpstan }}' = 'false' ] && [ '${{ needs.classify.outputs.needs_phpunit }}' = 'false' ]; then lane="frontend-static-fast"; fi
          if [ '${{ needs.classify.outputs.needs_portal_runtime_smoke }}' = 'true' ] && [ '${{ needs.classify.outputs.needs_playwright_e2e }}' = 'false' ] && [ '${{ needs.classify.outputs.needs_visual_e2e }}' = 'false' ] && [ '${{ needs.classify.outputs.needs_phpstan }}' = 'false' ] && [ '${{ needs.classify.outputs.needs_phpunit }}' = 'false' ]; then lane="portal-runtime-fast"; fi
          if [ '${{ needs.classify.outputs.needs_hmv4_safety }}' = 'true' ] || [ '${{ needs.classify.outputs.needs_playwright_e2e }}' = 'true' ]; then lane="hmv4"; fi
          if [ '${{ needs.classify.outputs.needs_portal_runtime_smoke }}' = 'true' ] && [ '${{ needs.classify.outputs.needs_playwright_e2e }}' = 'false' ] && [ '${{ needs.classify.outputs.needs_visual_e2e }}' = 'false' ]; then lane="portal-runtime-fast"; fi
          echo "  ${lane}"
          echo
          echo "Expected running jobs"
          echo "  - classify"
          [ '${{ needs.classify.outputs.needs_repo_boundary }}' = 'true' ] && echo "  - repo-boundary"
          [ '${{ needs.classify.outputs.needs_actionlint }}' = 'true' ] && echo "  - actionlint"
          [ '${{ needs.classify.outputs.needs_classifier_selftest }}' = 'true' ] && echo "  - classifier-selftest"
          if [ '${{ github.event_name }}' = 'workflow_dispatch' ] || [ '${{ github.event_name }}' = 'schedule' ] || [ '${{ needs.classify.outputs.needs_full_regression }}' = 'true' ]; then
            echo "  - branch-protection-audit"
          fi
          [ '${{ needs.classify.outputs.needs_php_syntax }}' = 'true' ] && echo "  - php-syntax"
          [ '${{ needs.classify.outputs.needs_phpstan }}' = 'true' ] && echo "  - phpstan"
          [ '${{ needs.classify.outputs.needs_phpunit }}' = 'true' ] && echo "  - phpunit"
          [ '${{ needs.classify.outputs.needs_kpi_tests }}' = 'true' ] && echo "  - kpi-guard"
          [ '${{ needs.classify.outputs.needs_db_migration_check }}' = 'true' ] && echo "  - db-migration-check"
          [ '${{ needs.classify.outputs.needs_openapi }}' = 'true' ] && echo "  - openapi"
          [ '${{ needs.classify.outputs.needs_doc_light }}' = 'true' ] && echo "  - doc-light"
          [ '${{ needs.classify.outputs.needs_doc_health }}' = 'true' ] && echo "  - doc-health"
          [ '${{ needs.classify.outputs.needs_raci }}' = 'true' ] && echo "  - raci-integrity"
          [ '${{ needs.classify.outputs.needs_frontend_js_safety }}' = 'true' ] && echo "  - frontend-js-safety"
          [ '${{ needs.classify.outputs.needs_frontend_static_safety }}' = 'true' ] && echo "  - frontend-static-safety"
          [ '${{ needs.classify.outputs.needs_graphics_safety }}' = 'true' ] && echo "  - graphics-safety"
          [ '${{ needs.classify.outputs.needs_portal_runtime_smoke }}' = 'true' ] && echo "  - portal-runtime-smoke"
          [ '${{ needs.classify.outputs.needs_hmv4_safety }}' = 'true' ] && echo "  - hmv4-safety"
          [ '${{ needs.classify.outputs.needs_playwright_e2e }}' = 'true' ] && echo "  - playwright-e2e"
          [ '${{ needs.classify.outputs.needs_visual_e2e }}' = 'true' ] && echo "  - hmv4-visual-e2e"
          [ '${{ needs.classify.outputs.needs_security_light }}' = 'true' ] && echo "  - security-light"
          echo "  - ci-summary"
          echo
          echo "Heavy gates skipped by design"
          [ '${{ needs.classify.outputs.needs_phpstan }}' = 'true' ] || echo "  - phpstan"
          [ '${{ needs.classify.outputs.needs_phpunit }}' = 'true' ] || echo "  - phpunit"
          [ '${{ needs.classify.outputs.needs_playwright_e2e }}' = 'true' ] || echo "  - playwright-e2e"
          [ '${{ needs.classify.outputs.needs_doc_health }}' = 'true' ] || echo "  - doc-health"
          [ '${{ needs.classify.outputs.needs_raci }}' = 'true' ] || echo "  - raci-integrity"
          [ '${{ needs.classify.outputs.needs_openapi }}' = 'true' ] || echo "  - openapi"
          echo
          echo "Repo-boundary policy"
          echo "  repo-boundary runs in parallel after classify and remains required by CI Summary."
          echo
          echo "Playwright decision"
          if [ '${{ needs.classify.outputs.needs_playwright_e2e }}' = 'true' ]; then
            echo "  Playwright runs because classifier found HMV4 behavior/E2E scope."
          elif [ '${{ github.event_name }}' = 'workflow_dispatch' ] && [ '${{ inputs.full_e2e }}' = 'true' ]; then
            echo "  Playwright runs because workflow_dispatch full_e2e=true."
          else
            echo "  Playwright skipped because no functional HMV4/E2E signal was present."
          fi
          echo
          echo "Portal runtime smoke decision"
          if [ '${{ needs.classify.outputs.needs_portal_runtime_smoke }}' = 'true' ]; then
            echo "  Portal runtime smoke runs for critical portal shell/runtime files."
            if [ '${{ needs.classify.outputs.needs_playwright_e2e }}' = 'false' ] && [ '${{ needs.classify.outputs.needs_visual_e2e }}' = 'false' ]; then
              echo "  Full Playwright and visual evidence remain skipped unless HMV4/E2E/visual policy signals are present."
            fi
          elif [ '${{ needs.classify.outputs.needs_full_regression }}' = 'true' ]; then
            echo "  Portal runtime smoke runs because full regression is required."
          else
            echo "  Portal runtime smoke skipped because no critical portal runtime signal was present."
          fi
          echo
          echo "Full regression decision"
          if [ '${{ needs.classify.outputs.needs_full_regression }}' = 'true' ]; then
            echo "  Full regression runs: ${{ needs.classify.outputs.full_required_reason }}"
          else
            echo "  Full regression skipped: changeset is classified and path-scoped."
          fi
          echo
          echo "Visual policy"
          visual_required='${{ (github.event_name == 'workflow_dispatch' && inputs.visual_required) || (github.event_name == 'pull_request' && (contains(github.event.pull_request.labels.*.name, 'visual-required') || contains(github.event.pull_request.labels.*.name, 'full-ci'))) }}'
          if [ "$visual_required" = "true" ]; then
            echo "  Visual policy: blocking"
            echo "  Visual result considered by CI Summary."
          else
            echo "  Visual policy: evidence-only"
            echo "  Visual result reported but ignored by CI Summary."
          fi
          echo
          echo "Merge governance"
          echo "::warning::DO NOT MERGE until CI Summary is success. If this PR is already merged and CI fails, treat as governance incident."
          echo "  CI Summary must be required in branch protection before merging to main."
          echo "  DO NOT MERGE until CI Summary is success. If this PR is already merged and CI fails, treat as governance incident."

          bad=0
          for result in \
            '${{ needs.classify.result }}' \
            '${{ needs.actionlint.result }}' \
            '${{ needs.classifier-selftest.result }}' \
            '${{ needs.branch-protection-audit.result }}' \
            '${{ needs.repo-boundary.result }}' \
            '${{ needs.php-syntax.result }}' \
            '${{ needs.phpstan.result }}' \
            '${{ needs.phpunit.result }}' \
            '${{ needs.kpi-guard.result }}' \
            '${{ needs.db-migration-check.result }}' \
            '${{ needs.openapi.result }}' \
            '${{ needs.doc-light.result }}' \
            '${{ needs.doc-health.result }}' \
            '${{ needs.raci-integrity.result }}' \
            '${{ needs.frontend-js-safety.result }}' \
            '${{ needs.frontend-static-safety.result }}' \
            '${{ needs.graphics-safety.result }}' \
            '${{ needs.portal-runtime-smoke.result }}' \
            '${{ needs.hmv4-safety.result }}' \
            '${{ needs.playwright-e2e.result }}' \
            '${{ needs.security-light.result }}'; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              bad=1
            fi
          done
          if [ "$visual_required" = "true" ]; then
            result='${{ needs.hmv4-visual-e2e.result }}'
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              bad=1
            fi
          fi
          if [ "$bad" -ne 0 ]; then
            echo "FAIL: at least one Smart CI gate failed or was cancelled." >&2
            exit 1
          fi
          echo "PASS: all running Smart CI gates passed."
