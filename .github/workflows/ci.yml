name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      - name: Check PHP syntax
        run: find mom/api mom/database -name "*.php" -exec php -l {} \; 2>&1 | grep -v "No syntax errors" | head -50 || true

  analyse:
    name: Static Analysis (PHPStan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_pgsql, mbstring, json
      - name: Install dependencies
        working-directory: mom
        run: composer install --no-interaction --prefer-dist
      - name: Run PHPStan
        working-directory: mom
        continue-on-error: true
        run: vendor/bin/phpstan analyse --error-format=github

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mom_test
          POSTGRES_USER: mom_app
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_pgsql, mbstring, json, redis
          coverage: xdebug
      - name: Install dependencies
        working-directory: mom
        run: composer install --no-interaction --prefer-dist
      - name: Run PHPUnit
        working-directory: mom
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: mom_test
          DB_USER: mom_app
          DB_PASS: test_password
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: vendor/bin/phpunit --testdox

  openapi:
    name: OpenAPI Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install spectral
        run: npm install -g @stoplight/spectral-cli
      - name: Validate OpenAPI spec
        run: spectral lint mom/api/openapi.yaml --fail-severity warn || true
