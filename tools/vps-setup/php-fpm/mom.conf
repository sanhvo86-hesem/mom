; =============================================================================
; HESEM MOM Portal - PHP-FPM Pool Configuration
; Install: cp this file /etc/php/8.2/fpm/pool.d/mom.conf
;          rm /etc/php/8.2/fpm/pool.d/www.conf  (remove default pool)
;          systemctl restart php8.2-fpm
; =============================================================================

[mom]

; ── Process identity ──────────────────────────────────────────────────────
user  = www-data
group = www-data

; ── Socket (Nginx connects here) ─────────────────────────────────────────
listen       = /run/php/php8.2-fpm.sock
listen.owner = www-data
listen.group = www-data
listen.mode  = 0660

; ── Process management ────────────────────────────────────────────────────
; Tuned for 8GB RAM VPS.
; Each PHP-FPM child uses ~30-50MB. With max_children=30 → max ~1.5GB for PHP.
; Remaining RAM: PostgreSQL (~2GB), Nginx (~100MB), OS (~1GB), headroom.
pm                   = dynamic
pm.max_children      = 30
pm.start_servers     = 5
pm.min_spare_servers = 3
pm.max_spare_servers = 10
pm.max_requests      = 500
pm.process_idle_timeout = 10s

; ── Status page (for monitoring) ─────────────────────────────────────────
pm.status_path = /fpm-status
ping.path      = /fpm-ping
ping.response  = pong

; ── Slow log (requests taking >5s) ───────────────────────────────────────
slowlog                    = /var/log/php-fpm/mom-slow.log
request_slowlog_timeout    = 5s
request_terminate_timeout  = 60s

; ── Environment Variables ─────────────────────────────────────────────────
; Database
env[DB_HOST]     = localhost
env[DB_PORT]     = 5432
env[DB_NAME]     = mom
env[DB_USER]     = mom_app
env[DB_PASS]     = CHANGE_ME_STRONG_PASSWORD
env[DB_SSL]      = prefer

; Feature flags (start with JSON-only, enable PostgreSQL when ready)
env[USE_POSTGRES]  = 0
env[SHADOW_WRITE]  = 1
env[JSON_FALLBACK] = 1

; API
env[QMS_API_ALLOWED_ORIGINS]         = https://eqms.hesemeng.com
env[QMS_API_ENFORCE_AUTH_MIDDLEWARE]  = true
env[QMS_API_EMIT_BACKEND_HEADERS]    = true
env[QMS_API_IDLE_TIMEOUT_SECONDS]    = 14400

; Data directory (default: relative to api.php)
; env[QMS_DATA_DIR] = /var/www/eqms.hesemeng.com/mom/data

; ── PHP admin overrides ───────────────────────────────────────────────────
; These override php.ini for this pool only.
php_admin_value[error_log]          = /var/www/eqms.hesemeng.com/mom/data/php_error.log
php_admin_flag[log_errors]          = on
php_admin_flag[display_errors]      = off
php_admin_value[expose_php]         = off

php_admin_value[memory_limit]       = 256M
php_admin_value[max_execution_time] = 60
php_admin_value[max_input_time]     = 60

php_admin_value[upload_max_filesize] = 25M
php_admin_value[post_max_size]       = 26M
php_admin_value[max_file_uploads]    = 10

php_admin_value[session.save_handler]    = files
php_admin_value[session.save_path]       = /var/www/eqms.hesemeng.com/mom/data/sessions
php_admin_value[session.cookie_secure]   = 1
php_admin_value[session.cookie_httponly]  = 1
php_admin_value[session.cookie_samesite] = Lax
php_admin_value[session.gc_maxlifetime]  = 14400

; OPcache
php_admin_value[opcache.enable]                  = 1
php_admin_value[opcache.memory_consumption]       = 256
php_admin_value[opcache.max_accelerated_files]    = 10000
php_admin_value[opcache.validate_timestamps]      = 0
php_admin_value[opcache.revalidate_freq]          = 0
