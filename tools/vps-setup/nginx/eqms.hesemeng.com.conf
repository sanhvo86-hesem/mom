# =============================================================================
# HESEM MOM Portal - Nginx Server Block
# Replaces all .htaccess rules from cPanel/Apache
# Install: cp this file /etc/nginx/sites-available/eqms.hesemeng.com
#          ln -s /etc/nginx/sites-available/eqms.hesemeng.com /etc/nginx/sites-enabled/
#          nginx -t && systemctl reload nginx
# =============================================================================

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name eqms.hesemeng.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name eqms.hesemeng.com;

    # ── SSL (managed by Certbot) ──────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/eqms.hesemeng.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eqms.hesemeng.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Root & Index ──────────────────────────────────────────────────────
    root  /var/www/eqms.hesemeng.com;
    index index.php index.html;

    # ── Upload Limit (matches PHP max 25MB) ───────────────────────────────
    client_max_body_size 25M;

    # ── Disable directory listing ─────────────────────────────────────────
    autoindex off;

    # ── Logging ───────────────────────────────────────────────────────────
    access_log /var/log/nginx/eqms.hesemeng.com.access.log;
    error_log  /var/log/nginx/eqms.hesemeng.com.error.log;

    # ══════════════════════════════════════════════════════════════════════
    # SECURITY HEADERS (converted from root .htaccess mod_headers)
    # ══════════════════════════════════════════════════════════════════════
    add_header X-Content-Type-Options            "nosniff" always;
    add_header X-Frame-Options                   "SAMEORIGIN" always;
    add_header Referrer-Policy                   "strict-origin-when-cross-origin" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header Strict-Transport-Security         "max-age=31536000; includeSubDomains" always;

    add_header Permissions-Policy "accelerometer=(), autoplay=(), camera=(), geolocation=(self), gyroscope=(), magnetometer=(), microphone=(), payment=(), publickey-credentials-get=(self), usb=()" always;

    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; script-src 'self' 'unsafe-inline' https://translate.google.com https://translate.googleapis.com https://translate-pa.googleapis.com https://www.gstatic.com https://translate.gstatic.com; style-src 'self' 'unsafe-inline' https://translate.google.com https://translate.googleapis.com https://www.gstatic.com https://translate.gstatic.com; img-src 'self' data: blob: https://hesem.com.vn https://www.hesem.com.vn https://translate.google.com https://translate.googleapis.com https://www.gstatic.com https://translate.gstatic.com; font-src 'self' data: https://www.gstatic.com https://translate.gstatic.com; connect-src 'self' https://translate.google.com https://translate.googleapis.com https://translate-pa.googleapis.com; frame-src 'self' https://translate.google.com https://translate.googleapis.com; media-src 'self' data: blob:; manifest-src 'self'; worker-src 'self' blob:; upgrade-insecure-requests" always;

    # ══════════════════════════════════════════════════════════════════════
    # ACCESS CONTROL (converted from .htaccess RewriteRules)
    # ══════════════════════════════════════════════════════════════════════

    # Block hidden files/dirs (except .well-known for ACME/Let's Encrypt)
    location ~ /\.(?!well-known) {
        deny all;
        return 403;
    }

    # Block internal directories
    location ~ ^/(\.git|\.vscode|\.claude|tools|_build|_Deleted|_reports|__pycache__)/ {
        deny all;
        return 403;
    }

    # Block internal docs (API docs, dev docs) - controlled docs are served via doc_stream rewrite
    location ~ ^/mom/docs/.*\.(md|json|csv)$ {
        deny all;
        return 403;
    }

    # Block SECURITY_OPERATIONS.md
    location = /mom/SECURITY_OPERATIONS.md {
        deny all;
        return 403;
    }

    # Block sensitive file extensions
    location ~* \.(zip|sql|bak|old|md|py|ps1|log|sqlite|db|pem|key|dist|tmp)$ {
        deny all;
        return 403;
    }

    # Block form_workflow.php direct access (from mom/.htaccess)
    location = /mom/form_workflow.php {
        deny all;
        return 403;
    }

    # Block online_schema_workflow.php direct access
    location = /mom/online_schema_workflow.php {
        deny all;
        return 403;
    }

    # Block data directory (from mom/data/.htaccess: Require all denied)
    location ~ ^/mom/data/ {
        deny all;
        return 403;
    }

    # Block scripts directory (from mom/scripts/.htaccess)
    # Note: only block PHP/server files - JS/CSS are served normally via static block
    location ~ ^/mom/scripts/.*\.php$ {
        deny all;
        return 403;
    }

    # ══════════════════════════════════════════════════════════════════════
    # LEGACY REDIRECTS (302) - converted from .htaccess RewriteRules
    # ══════════════════════════════════════════════════════════════════════

    # ── Legacy path redirects (301 permanent — backward compat) ──
    location ~ ^/01-QMS-Portal/(.*)$ {
        return 301 /mom/$1;
    }
    location ~ ^/02-Tai-Lieu-He-Thong/(.*)$ {
        return 301 /mom/docs/system/$1;
    }
    location ~ ^/03-Tai-Lieu-Van-Hanh/(.*)$ {
        return 301 /mom/docs/operations/$1;
    }
    location ~ ^/04-Bieu-Mau/(.*)$ {
        return 301 /mom/docs/forms/$1;
    }
    location ~ ^/10-Training-Academy/(.*)$ {
        return 301 /mom/docs/training/$1;
    }
    location ~ ^/05-Processes(/index\.html)?$ {
        return 302 /mom/docs/operations/sops/index.html;
    }
    location ~ ^/07-Forms-Records(/index\.html)?$ {
        return 302 /mom/docs/forms/index.html;
    }
    location ~ ^/08-Organization/03-Job-Descriptions(/index\.html)?$ {
        return 302 /mom/docs/system/organization/03-Job-Descriptions/index.html;
    }

    # ══════════════════════════════════════════════════════════════════════
    # DOCUMENT STREAMING (controlled docs through auth gate)
    # Routes: archive, mom/docs/system, operations, forms, training
    # ══════════════════════════════════════════════════════════════════════

    location ~ ^/(archive|mom/docs/system|mom/docs/operations|mom/docs/forms|mom/docs/training)/(.+)\.(html|xlsx|xlsm|xls|csv)$ {
        rewrite ^/(archive|mom/docs/system|mom/docs/operations|mom/docs/forms|mom/docs/training)/(.+)\.(html|xlsx|xlsm|xls|csv)$ /mom/api.php?action=doc_stream&path=$1/$2.$3 last;
    }

    # ══════════════════════════════════════════════════════════════════════
    # EXCEL DOWNLOAD HEADERS (force download for form templates)
    # ══════════════════════════════════════════════════════════════════════

    location ~ ^/mom/docs/forms/.*\.(xlsx|xlsm|xls)$ {
        types {
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet xlsx;
            application/vnd.ms-excel.sheet.macroEnabled.12                   xlsm;
            application/vnd.ms-excel                                         xls;
        }
        add_header Content-Disposition    "attachment" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ══════════════════════════════════════════════════════════════════════
    # REST API v1 — route to api/index.php (MVC Router)
    #
    # Two patterns are needed:
    #   /mom/api/v1/* — relative-path calls from portal.html (modules 41,47,50)
    #   /api/v1/*     — absolute-path calls (modules 56-IQC, 57-SPC, etc.)
    #
    # PATH_INFO is explicitly set so the Router sees routes WITHOUT the /mom/
    # directory prefix (routes are registered as /api/v1/eqms/... not /mom/api/v1/...).
    # ══════════════════════════════════════════════════════════════════════

    # Relative REST calls from /mom/portal.html  →  /mom/api/v1/eqms/...
    # PATH_INFO strips /mom prefix so routes match /api/v1/... registration.
    location ~ ^/mom/api/v1/(.*)$ {
        fastcgi_pass  unix:/run/php/php8.2-fpm.sock;
        include       fastcgi_params;
        # Override PATH_INFO AFTER include so it is not clobbered by fastcgi_params default
        fastcgi_param SCRIPT_FILENAME $document_root/mom/api/index.php;
        fastcgi_param SCRIPT_NAME     /mom/api/index.php;
        fastcgi_param PATH_INFO       /api/v1/$1;
        fastcgi_param REQUEST_URI     $request_uri;
        fastcgi_param QUERY_STRING    $query_string;
        fastcgi_read_timeout    60s;
        fastcgi_send_timeout    60s;
        fastcgi_connect_timeout 5s;
        fastcgi_buffering         on;
        fastcgi_buffer_size       16k;
        fastcgi_buffers           16 16k;
        fastcgi_busy_buffers_size 32k;
    }

    # Absolute REST calls from module JS  →  /api/v1/mes/quality/... etc.
    # $uri does not include query string — correct for PATH_INFO.
    location ~ ^/api/v1/ {
        fastcgi_pass  unix:/run/php/php8.2-fpm.sock;
        include       fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root/mom/api/index.php;
        fastcgi_param SCRIPT_NAME     /mom/api/index.php;
        fastcgi_param PATH_INFO       $uri;
        fastcgi_param REQUEST_URI     $request_uri;
        fastcgi_param QUERY_STRING    $query_string;
        fastcgi_read_timeout    60s;
        fastcgi_send_timeout    60s;
        fastcgi_connect_timeout 5s;
        fastcgi_buffering         on;
        fastcgi_buffer_size       16k;
        fastcgi_buffers           16 16k;
        fastcgi_busy_buffers_size 32k;
    }

    # ══════════════════════════════════════════════════════════════════════
    # PHP-FPM PROCESSING
    # ══════════════════════════════════════════════════════════════════════

    location ~ \.php$ {
        # Security: only execute PHP files that actually exist on disk
        try_files $uri =404;

        fastcgi_pass  unix:/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include       fastcgi_params;

        # Pass query string
        fastcgi_param QUERY_STRING $query_string;

        # Timeouts
        fastcgi_read_timeout    60s;
        fastcgi_send_timeout    60s;
        fastcgi_connect_timeout 5s;

        # Buffer settings
        fastcgi_buffering         on;
        fastcgi_buffer_size       16k;
        fastcgi_buffers           16 16k;
        fastcgi_busy_buffers_size 32k;
    }

    # ══════════════════════════════════════════════════════════════════════
    # STATIC FILES - Caching & Performance
    # ══════════════════════════════════════════════════════════════════════

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires    30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # PWA manifest & service worker - no caching
    location = /mom/manifest.json {
        add_header Cache-Control "no-cache";
    }
    location = /mom/sw.js {
        add_header Cache-Control "no-cache";
    }

    # ══════════════════════════════════════════════════════════════════════
    # MONITORING (internal only)
    # ══════════════════════════════════════════════════════════════════════

    location = /nginx_status {
        stub_status;
        allow 127.0.0.1;
        deny  all;
    }
}
