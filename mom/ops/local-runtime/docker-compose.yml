version: "3.9"

services:
  app:
    image: php:8.2-apache
    ports:
      - "8080:80"
    volumes:
      - ../../:/var/www/html
    environment:
      - QMS_DATA_DIR=/var/www/html/mom/data
      - PHP_INI_SCAN_DIR=/var/www/html/ops/local-runtime/php-conf
    depends_on:
      - db
      - otel-collector
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/auth/status"]
      interval: 10s
      timeout: 5s
      retries: 3

  db:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: qms_local
      POSTGRES_USER: qms
      POSTGRES_PASSWORD: qms_local_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../../database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qms"]
      interval: 5s
      timeout: 3s
      retries: 5

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # Prometheus metrics
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:13133/"]
      interval: 10s
      timeout: 5s
      retries: 3

  jaeger:
    image: jaegertracing/all-in-one:1.54
    ports:
      - "16686:16686"  # Jaeger UI
      - "14268:14268"  # Jaeger collector
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

volumes:
  pgdata:
