                additionalProperties: true
        '409':
          description: Change request command blocked.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    enum: [change_request_idempotency_conflict, change_request_terminal_status_requires_transition]

  /api/v1/eqms/change-requests/transition:
    post:
      operationId: eqmsTransitionChangeRequest
      tags: [EQMS Control Plane]
      summary: Transition a governed change request
      description: Requires actor roles and reason for state transitions before change-order authorization.
      security:
        - sessionCookie: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [change_request_id, target_status, reason, actor_roles]
              additionalProperties: true
      responses:
        '200':
          description: Change request transitioned.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '409':
          description: Transition blocked by governance state.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    enum: [change_request_transition_actor_roles_required, change_request_transition_role_not_authorized, invalid_change_request_transition]

  /api/v1/eqms/change-orders:
    post:
      operationId: eqmsCreateChangeOrder
      tags: [EQMS Control Plane]
      summary: Create a governed change order
      description: Creates affected/resulting/effectivity/training/verification records under role-gated portal authority.
      security:
        - sessionCookie: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [idempotency_key, title, affected_objects]
              additionalProperties: true
      responses:
        '201':
          description: Change order created.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Change order command blocked.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    enum: [resulting_object_affected_object_required, change_order_idempotency_conflict]

  /api/v1/eqms/change-orders/transition:
    post:
      operationId: eqmsTransitionChangeOrder
      tags: [EQMS Control Plane]
      summary: Transition a governed change order
      description: Release transitions enforce role policy, reason, release signature, active effectivity conflict detection, and release side effects.
      security:
        - sessionCookie: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [change_order_id, target_status, reason, actor_roles]
              additionalProperties: true
      responses:
        '200':
          description: Change order transitioned.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '409':
          description: Transition blocked by governance state.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    enum: [change_order_release_gate_blocked, change_order_release_signature_required, change_order_release_signature_not_authoritative, change_order_transition_actor_roles_required, change_order_transition_role_not_authorized, change_release_side_effect_failed]

  /api/v1/eqms/change-orders/release-gate/evaluate:
    post:
      operationId: eqmsEvaluateChangeOrderReleaseGate
      tags: [EQMS Control Plane]
      summary: Evaluate change-order release readiness
      description: Evaluates affected/resulting objects, effectivity, training, verification, WIP impact, rollback, emergency controls, and conflicts without releasing the order.
      security:
        - sessionCookie: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [change_order_id]
              additionalProperties: true
      responses:
        '200':
          description: Release gate decision returned.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/v1/eqms/publications/retry-plan:
    get:
      operationId: eqmsPublicationRetryPlan
      tags: [EQMS Control Plane]
      summary: Read publication retry plan
      description: Lists asynchronous publication work needing retry; publication is read-only/discovery and separate from finalization.
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Publication retry plan returned.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/v1/eqms/publications/monitor:
    get:
      operationId: eqmsPublicationMonitor
      tags: [EQMS Control Plane]
      summary: Monitor asynchronous publication states
      description: Returns publication queue, failure, receipt, and retry state without treating publication as authoritative record acceptance.
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Publication monitor returned.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/v1/eqms/publications/actions:
    post:
      operationId: eqmsRequestPublicationAction
      tags: [EQMS Control Plane]
      summary: Request a governed publication action
      description: Enqueues retry, cancel, hold, or acknowledge actions for publication workers under role and reason policy.
      security:
        - sessionCookie: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [publication_id, action, reason]
              additionalProperties: true
      responses:
        '202':
          description: Publication action accepted.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/v1/eqms/audit-packs/manifest:
    post:
      operationId: eqmsBuildAuditPack
      tags: [EQMS Control Plane]
      summary: Build a scoped audit pack manifest
      description: Audit packs are scoped to exact canonical records and fail closed when evidence packages or finalization audit timeline are incomplete.
      security:
        - sessionCookie: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [scope]
              additionalProperties: true
      responses:
        '200':
          description: Audit pack manifest returned.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '409':
          description: Audit pack incomplete.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    enum: [audit_pack_incomplete, audit_timeline_missing_finalization_event]

  /api/v1/eqms/audit-packs/export:
    get:
      operationId: eqmsReadAuditPackExport
      tags: [EQMS Control Plane]
      summary: Read a previously built audit pack export
      description: Returns the durable audit-pack export receipt and bundle metadata by export id or scope reference.
      security:
        - sessionCookie: []
      parameters:
        - in: query
          name: audit_pack_export_id
          required: false
          schema: { type: string }
        - in: query
          name: scope_type
          required: false
          schema: { type: string }
        - in: query
          name: scope_ref
          required: false
          schema: { type: string }
      responses:
        '200':
          description: Audit pack export returned.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '404':
          description: Audit pack export not found.

  /api/v1/eqms/evidence/amendments:
    post:
      operationId: eqmsCreateEvidenceAmendment
      tags: [EQMS Control Plane]
      summary: Create an evidence amendment under change authority
      description: Post-finalization amendment requires a released change order covering the exact evidence object, field set, and effectivity.
      security:
        - sessionCookie: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [evidence_record_id, source_change_order_id, amendment_reason]
              additionalProperties: true
      responses:
        '201':
          description: Evidence amendment created.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '409':
          description: Amendment blocked by change authority or immutable record policy.

  /api/v1/eqms/evidence/package:
    get:
      operationId: eqmsCanonicalEvidencePackage
      tags: [EQMS Control Plane]
      summary: Read a canonical evidence package
      description: Returns the authoritative evidence package assembled from records, versions, artifacts, signatures, publication, retention, and audit trail.
      security:
        - sessionCookie: []
      parameters:
        - in: query
          name: evidence_record_id
          required: false
          schema: { type: string }
        - in: query
          name: evidence_key
          required: false
          schema: { type: string }
      responses:
        '200':
          description: Canonical evidence package returned.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '404':
          description: Evidence package not found.

  /api/v1/eqms/evidence-graph/preview:
    post:
      operationId: eqmsEvidenceGraphPreview
      tags: [EQMS Control Plane]
      summary: Preview unified evidence graph links
      description: Shows evidence, change, document, publication, training, and genealogy link candidates without mutating authoritative records.
      security:
        - sessionCookie: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [evidence_record_id]
              additionalProperties: true
      responses:
        '200':
          description: Evidence graph preview returned.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/v1/eqms/genealogy/facts:
    post:
      operationId: eqmsRecordGenealogyFact
      tags: [EQMS Control Plane]
      summary: Record a scoped genealogy edge fact
      description: Writes append-only 5M/genealogy linkage under authenticated session scope; caller-supplied org or plant scope fields are rejected.
      security:
        - sessionCookie: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [edge_fact_type, from_object_type, from_object_id, to_object_type, to_object_id]
              additionalProperties: true
      responses:
        '201':
          description: Genealogy fact recorded.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '409':
          description: Genealogy write rejected.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    enum: [scope_context_required, caller_scope_field_forbidden, genealogy_edge_fact_fingerprint_required_for_replay]

  /api/v1/eqms/genealogy/5m/evaluate:
    post:
      operationId: eqmsEvaluate5MGate
      tags: [EQMS Control Plane]
      summary: Evaluate required 5M context before release or production acceptance
      description: Returns blockers when material, machine, method, measurement, or man/personnel context is incomplete. Scope is derived from the authenticated portal session; caller-supplied org or scope fields are rejected.
      security:
        - sessionCookie: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: 5M gate evaluation returned.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '403':
          description: Caller supplied an unauthorized scope field or lacks a session scope.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    enum: [unauthorized_scope_field_in_request, scope_context_required]
        '409':
          description: 5M evaluation could not be persisted into the scoped genealogy partition.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    enum: [genealogy_partition_scope_required, traceability_5m_gate_not_met]

  /api/v1/eqms/genealogy/as-manufactured:
    get:
      operationId: eqmsAsManufacturedThread
      tags: [EQMS Control Plane]
      summary: Read scoped as-manufactured genealogy thread
      description: Reads are role-gated and scoped by the authenticated session; caller-supplied plant/org scope fields are rejected.
      security:
        - sessionCookie: []
      parameters:
        - in: query
          name: subject_type
          required: true
          schema: { type: string }
        - in: query
          name: subject_id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: As-manufactured thread returned.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '403':
          description: Role or scope violation.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    enum: [forbidden, unauthorized_scope_field_in_request]

  /api/v1/eqms/admin/repo-boundary-scan:
    get:
      operationId: eqmsRepoBoundaryScan
      tags: [EQMS Control Plane]
      summary: Run controlled-source boundary scan
      description: Admin-only scan that separates controlled source from generated, temporary, browser-test, report, and runtime residue.
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Repo boundary scan returned.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/v1/eqms/periodic-evaluations:
    get:
      operationId: eqmsPeriodicEvaluationDashboard
      tags: [EQMS Control Plane]
      summary: Read periodic evaluation dashboard
      description: Returns the org-scoped periodic evaluation register, due state, integrity/audit-pack references, exceptions, closure state, and append-only closure-event proof.
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Periodic evaluation dashboard returned.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    post:
      operationId: eqmsSchedulePeriodicEvaluation
      tags: [EQMS Control Plane]
      summary: Schedule a periodic evaluation
      description: Creates a governed periodic evaluation item with server-resolved org scope, owner, due date, scope, and proof expectations.
      security:
        - sessionCookie: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [evaluation_scope, scope_ref, due_at]
              properties:
                evaluation_scope:
                  type: string
                  enum: [evidence_record, change_order, document_revision, publication, genealogy_graph, system_integrity]
                scope_ref:
                  type: string
                due_at:
                  type: string
                  format: date-time
                assigned_role:
                  type: string
                result_payload:
                  type: object
                  additionalProperties: true
              additionalProperties: true
      responses:
        '201':
          description: Periodic evaluation scheduled.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/v1/eqms/periodic-evaluations/close:
    post:
      operationId: eqmsClosePeriodicEvaluation
      tags: [EQMS Control Plane]
      summary: Close a periodic evaluation
      description: Closes an org-scoped periodic evaluation only when required integrity, audit-pack, waiver signature, and reviewer proof are recorded; terminal rows are immutable and closure is represented by an append-only event.
      security:
        - sessionCookie: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [periodic_evaluation_id, evaluation_state]
              properties:
                periodic_evaluation_id:
                  type: string
                  format: uuid
                evaluation_state:
                  type: string
                  enum: [passed, failed, waived]
                integrity_digest_id:
                  type: string
                  format: uuid
                audit_pack_export_id:
                  type: string
                  format: uuid
                waiver_signature_event_id:
                  type: string
                  format: uuid
                closure_reason:
                  type: string
                result_payload:
                  type: object
                  additionalProperties: true
              additionalProperties: true
      responses:
        '200':
          description: Periodic evaluation closed.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

# ═══════════════════════════════════════════════════════════════════════════════
# COMPONENTS
# ═══════════════════════════════════════════════════════════════════════════════

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: PHPSESSID
      description: Session-authenticated portal user.
    csrfHeader:
      type: apiKey
      in: header
      name: X-CSRF-Token
      description: Required together with sessionCookie on every state-changing slice operation.

  parameters:
    CsrfHeader:
      name: X-CSRF-Token
      in: header
      required: true
      schema:
        type: string
      description: CSRF token from the latest auth status or login response.
    IfMatchHeader:
      name: If-Match
      in: header
      required: false
      schema:
        type: string
      description: Current backend authority ETag. State-changing graphics governance endpoints also accept `expectedVersion` in the JSON body.
    TraceabilityLotNumber:
      name: lot_number
      in: query
      required: false
      schema:
        type: string
      description: Material, supplier, production, or output lot number.
    TraceabilitySerialNumber:
      name: serial_number
      in: query
      required: false
      schema:
        type: string
      description: Serial identity for serial-level genealogy where available.
    TraceabilityShipmentId:
      name: shipment_id
      in: query
      required: false
      schema:
        type: string
      description: Shipment, packing, or package reference.
    TraceabilitySupplierIssueId:
      name: supplier_issue_id
      in: query
      required: false
      schema:
        type: string
      description: Supplier issue, SCAR, NCR, CAPA, or incoming-quality issue reference.
    TraceabilityScopeSiteId:
      name: site_id
      in: query
      required: false
      schema:
        type: string
      description: Site or plant scope guard for genealogy queries.
    TemplateIdPath:
      name: templateId
      in: path
      required: true
      schema:
        type: string
      description: Template ID, canonical ID, legacy code or alias.
    WaiverIdPath:
      name: waiverId
      in: path
      required: true
      schema:
        type: string
      description: Graphics governance waiver ID.

  schemas:
    # ── Envelopes ──

    SuccessEnvelope:
      type: object
      required: [ok, server_time]
      properties:
        ok:
          type: boolean
          const: true
        server_time:
          type: string
          format: date-time
          description: Server UTC timestamp (ISO 8601).

    RegistryDocumentEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          required: [data]
          properties:
            data:
              type: object
              additionalProperties: true
              description: Registry document payload.
            count:
              type: integer
              description: Optional record count for the returned registry.

    SystemContractEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          required: [data, summary]
          properties:
            summary:
              type: object
              required: [tableCount, endpointCount, workflowCount, contractObjectCount, globalCapabilityCount]
              properties:
                tableCount:
                  type: integer
                endpointCount:
                  type: integer
                workflowCount:
                  type: integer
                statusSetCount:
                  type: integer
                relationEntityCount:
                  type: integer
                contractObjectCount:
                  type: integer
                contractPackageCount:
                  type: integer
                globalCapabilityCount:
                  type: integer
                globalCapabilityBlockingGapCount:
                  type: integer
                systemContractCriticalGapCount:
                  type: integer
            data:
              type: object
              additionalProperties: true
              properties:
                summary:
                  type: object
                  additionalProperties: true
                storage_authority:
                  type: object
                  properties:
                    databaseSchemaSource:
                      type: string
                    tableCount:
                      type: integer
                    schemaName:
                      type: string
                    databaseName:
                      type: string
                system_contract_authority:
                  type: object
                  additionalProperties: true
                  description: DB-derived read-only authority artifacts generated from table-registry, endpoint-catalog, workflow-library, relation-map, and schema authority. This is not the editable Workspace Design Draft.
                table_registry:
                  type: object
                  additionalProperties: true
                endpoint_catalog:
                  type: object
                  additionalProperties: true
                workflow_library:
                  type: object
                  additionalProperties: true
                status_options:
                  type: object
                  additionalProperties: true
                relation_map:
                  type: object
                  additionalProperties: true
                runtime_access_policy:
                  type: object
                  additionalProperties: true
                business_contracts:
                  type: object
                  additionalProperties: true
                global_capability_audit:
                  type: object
                  additionalProperties: true

    ErrorResponse:
      type: object
      required: [ok, error]
      properties:
        ok:
          type: boolean
          const: false
        error:
          type: string
          description: Machine-readable error code.
        detail:
          type: string
          description: Optional human-readable detail message.
        server_time:
          type: string
          format: date-time

    # ── Graphics Governance ──

    DesignConfig:
      type: object
      description: Backend-authoritative design configuration. Browser localStorage may cache it but is not authority.
      additionalProperties: true
      properties:
        _meta:
          type: object
          additionalProperties: true
          properties:
            version:
              type: string
            updatedAt:
              type: string
              format: date-time
            updatedBy:
              type: string
            authority:
              type: string
            localStorageAuthority:
              type: boolean
              const: false

    DesignConfigSaveRequest:
      type: object
      required: [config]
      properties:
        expectedVersion:
          type: string
          description: Current version or ETag from the last GET response.
        config:
          $ref: '#/components/schemas/DesignConfig'

    DesignConfigResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          required: [config, version, etag, authority]
          properties:
            config:
              $ref: '#/components/schemas/DesignConfig'
            data:
              $ref: '#/components/schemas/DesignConfig'
            version:
              type: string
            etag:
              type: string
            authority:
              type: object
              additionalProperties: true

    TemplateRegistryEntry:
      type: object
      required: [templateId, canonicalId, version, status, owner, moduleArchetype, zones, allowedZones, allowedBlocks, allowedBlocksByZone, governedModules, regulatedCompatibility, shopfloorCompatibility, defaultDensity, supportedDensities, themePolicy, responsivePolicy, qaEvidence, updatedBy, updatedAt, evidenceRefs]
      additionalProperties: true
      properties:
        templateId:
          type: string
        canonicalId:
          type: string
        legacyCode:
          type: string
        aliases:
          type: array
          items:
            type: string
        version:
          type: string
          pattern: '^\d+\.\d+\.\d+'
        status:
          type: string
          enum: [draft-only, controlled-draft, validated, publish-blocked, published, deprecated, legacy-bridged]
        registryStatus:
          type: string
          enum: [approved, draft, deprecated, retired, published, controlled-draft]
        owner:
          type: string
        moduleArchetype:
          type: string
        description:
          type: object
          additionalProperties: true
        zones:
          type: array
          items:
            type: object
            required: [zoneId, type, required]
            additionalProperties: true
            properties:
              zoneId:
                type: string
              type:
                type: string
              required:
                type: boolean
        allowedBlocksByZone:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
        allowedZones:
          type: array
          items:
            type: string
        allowedBlocks:
          oneOf:
            - type: array
              items:
                type: string
            - type: object
              additionalProperties:
                type: array
                items:
                  type: string
        governedModules:
          type: array
          items:
            type: string
        regulatedCompatibility:
          type: string
        shopfloorCompatibility:
          type: string
        updatedBy:
          type: string
        updatedAt:
          type: string
        evidenceRefs:
          type: array
          items:
            type: string
        defaultDensity:
          type: string
          enum: [compact, default, comfortable, shopfloor]
        supportedDensities:
          type: array
          items:
            type: string
            enum: [compact, default, comfortable, shopfloor]
        themePolicy:
          type: object
          additionalProperties: true
        responsivePolicy:
          type: object
          additionalProperties: true
        qaEvidence:
          type: object
          additionalProperties: true
        releaseManifestRefs:
          type: array
          items:
            $ref: '#/components/schemas/GraphicsReleaseManifestRef'
        waiverIds:
          type: array
          items:
            type: string

    TemplateRegistryCollection:
      type: object
      required: [_meta, templates]
      additionalProperties: true
      properties:
        _meta:
          type: object
          additionalProperties: true
        templates:
          type: array
          items:
            $ref: '#/components/schemas/TemplateRegistryEntry'

    TemplateRegistryCollectionResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          required: [registry, templates, version, etag, persistence]
          properties:
            registry:
              $ref: '#/components/schemas/TemplateRegistryCollection'
            templateRegistry:
              $ref: '#/components/schemas/TemplateRegistryCollection'
            templates:
              type: array
              items:
                $ref: '#/components/schemas/TemplateRegistryEntry'
            version:
              type: string
            etag:
              type: string
            persistence:
              type: object
              additionalProperties: true
            componentContractRegistry:
              $ref: '#/components/schemas/ComponentContractRegistry'

    TemplateEntryResponse:
      allOf:
