          type: string
        subject_type:
          type: string
        subject_id:
          type: string
        control_family:
          type: string
        control_code:
          type: string
        reason_code:
          type: string
        reason_label:
          type: string
        reason_text:
          type: string
        approved_by:
          type: string
        approved_role:
          type: string
        approved_at:
          type: string
          format: date-time
        effective_from:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        approval_reference:
          type: [string, "null"]
        follow_up_status:
          type: string
        e_signature:
