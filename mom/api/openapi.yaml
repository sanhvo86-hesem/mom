          type: string

    # ── Governance Requests ──

    DecideApprovalGroupRequest:
      type: object
      required: [decisionCode]
      properties:
        decisionCode:
          type: string
          enum: [approve, reject, request_changes]
          description: The decision to submit.
        commentText:
          type: string
          description: Optional comment accompanying the decision.
        reasonCode:
          type: string
          description: Optional machine-readable reason code.
        electronicSignatureId:
          type: string
          format: uuid
          description: Optional electronic signature reference for regulatory traceability.

  responses:
    SuccessOnly:
      description: Generic success.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuccessEnvelope'

    BadRequest:
      description: Bad request -- missing or invalid parameters.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error: "missing_code"
            server_time: "2025-06-01T08:00:00+00:00"

    Unauthorized:
      description: Not authenticated or invalid credentials.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error: "unauthorized"
            server_time: "2025-06-01T08:00:00+00:00"

    Forbidden:
      description: Insufficient permissions (not admin or lacking role).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error: "forbidden"
            server_time: "2025-06-01T08:00:00+00:00"

    RateLimited:
      description: Too many requests.
      headers:
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
        X-RateLimit-Reset:
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error: "rate_limited"
            server_time: "2025-06-01T08:00:00+00:00"

    ServerError:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error: "server_error"
            server_time: "2025-06-01T08:00:00+00:00"

    # ── RFC 9457 ProblemDetail error responses ──

    DefaultProblem:
      description: RFC 9457 Problem Detail for authentication, permission, validation, concurrency, release-blocker or server failures.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

    BadRequestProblem:
      description: Bad request -- the request body or parameters are invalid.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

    UnauthorizedProblem:
      description: Authentication required or session expired.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

    ForbiddenProblem:
      description: Insufficient permissions for this operation.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

    NotFound:
      description: The requested resource was not found.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

    Conflict:
      description: Conflict -- the resource state has changed since last read.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

    PreconditionFailed:
      description: Precondition failed -- the If-Match ETag does not match the current resource version.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

    UnsupportedMediaType:
      description: Unsupported media type -- the request Content-Type is not accepted.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

    UnprocessableEntity:
      description: Unprocessable entity -- the request is syntactically valid but semantically incorrect.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

    PreconditionRequired:
      description: Precondition required -- a conditional header (e.g. If-Match) is mandatory for this request.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

security:
  - sessionCookie: []
