      security:
        - sessionCookie: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [signed_payload_hash_sha256, displayed_record_hash_sha256]
              additionalProperties: true
              properties:
                signature_action:
                  type: string
                  default: evidence_finalize
                  enum: [evidence_finalize, document_release, document_read_acknowledgement, form_submission_acceptance, periodic_evaluation_waiver, change_order_release, verification_waiver]
                signed_payload_hash_sha256:
                  type: string
                  pattern: '^[a-f0-9]{64}$'
                displayed_record_hash_sha256:
                  type: string
                  pattern: '^[a-f0-9]{64}$'
      responses:
        '201':
          description: Signature challenge issued.
          content:
