  /api/v1/governance/approval-groups/{approvalGroupId}:decide:
    post:
      operationId: decideApprovalGroup
      tags: [Governance]
      summary: Submit a decision on an approval group
      description: |
        Submit an approve, reject, or request-changes decision on an approval group.
        Requires the If-Match header with the current ETag to prevent lost updates.

        Decisions are validated through the ApprovalWorkflowAdapter which enforces:
        state validation, self-approval prohibition, and concurrency protection
        before canonical persistence.
      security:
        - sessionCookie: []
          csrfHeader: []
      parameters:
        - name: approvalGroupId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Unique identifier of the approval group.
        - name: If-Match
          in: header
          required: true
          schema:
            type: string
          description: ETag value from the last GET of the approval group.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DecideApprovalGroupRequest'
      responses:
        '200':
          description: Decision recorded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalDecisionResultEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestProblem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '428':
          $ref: '#/components/responses/PreconditionRequired'

