      properties:
        override_type:
          type: string
        subject_type:
          type: string
        subject_id:
          type: string
        control_family:
          type: string
        control_code:
          type: string
        reason_code:
          type: string
        reason_text:
          type: string
        approved_by:
          type: string
        approved_role:
          type: string
        requested_by:
          type: string
        requested_role:
          type: string
        approval_reference:
          type: string
        effective_from:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        source_context:
          type: object
          additionalProperties: true

    TransitionOverrideControlRequest:
      type: object
      required: [transition, reason]
