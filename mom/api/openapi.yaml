        ledger_scope:
          type: string
          enum: [AP, AR, PLANT]
        close_status:
          type: string
        closed_by:
          type: string
        closed_at:
          type: string
          format: date-time
        reason:
          type: string
        e_signature:
          type: object
          additionalProperties: true

    PeriodCloseConnection:
      type: object
      required: [period_closes]
      properties:
        period_closes:
          type: array
          items:
            $ref: '#/components/schemas/PeriodCloseItem'

    PeriodCloseEnvelope:
      type: object
      required: [period_close]
      properties:
        period_close:
          $ref: '#/components/schemas/PeriodCloseItem'

    CreatePeriodCloseRequest:
      type: object
      required: [period_code, ledger_scope, reason]
      properties:
        period_code:
          type: string
          pattern: '^\\d{4}-(0[1-9]|1[0-2])$'
        ledger_scope:
          type: string
          enum: [AP, AR, PLANT]
        reason:
          type: string

    TransitionPeriodCloseRequest:
      type: object
      required: [transition, reason]
      properties:
        transition:
          type: string
          enum: [reopen, close]
