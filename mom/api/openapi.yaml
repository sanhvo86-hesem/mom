      required: [backdate_exception_id, exception_status, ledger_scope, subject_type, subject_ref, requested_posting_date, approved_by, approved_at, expires_at]
      properties:
        backdate_exception_id:
          type: string
        exception_status:
          type: string
        ledger_scope:
          type: string
          enum: [AP, AR, PLANT, EXECUTION]
        subject_type:
          type: string
        subject_ref:
          type: string
        reason_code:
          type: string
        reason:
          type: string
        approval_reference:
          type: string
        original_event_at:
          type: string
          format: date-time
        requested_posting_date:
          type: string
          format: date
        approved_period_code:
          type: string
        approved_by:
          type: string
        approved_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        e_signature:
          type: object
          additionalProperties: true

    BackdateExceptionConnection:
      type: object
      required: [backdate_exceptions]
      properties:
        backdate_exceptions:
          type: array
          items:
            $ref: '#/components/schemas/BackdateExceptionItem'

    BackdateExceptionEnvelope:
      type: object
      required: [backdate_exception]
      properties:
        backdate_exception:
