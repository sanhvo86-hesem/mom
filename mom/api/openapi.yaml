              - $ref: '#/components/schemas/GraphicsReleaseManifestRef'
        releaseManifestRefs:
          type: array
          items:
            $ref: '#/components/schemas/GraphicsReleaseManifestRef'
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
        approvedAt:
          type: string
          format: date-time
        approvedBy:
          type: string
        expiredAt:
          type: string
          format: date-time
        expiredBy:
          type: string
        expiresAt:
          type: string
          format: date-time

    GraphicsWaiverResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          required: [waiver]
          properties:
            waiver:
              $ref: '#/components/schemas/GraphicsWaiver'
            version:
              type: string
            etag:
              type: string

    GraphicsActiveWaiversResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          required: [waivers]
          properties:
            waivers:
              type: array
              items:
                $ref: '#/components/schemas/GraphicsWaiver'
            version:
              type: string
            etag:
              type: string

    TemplateModulesResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          required: [templateId, modules]
          properties:
            templateId:
              type: string
            modules:
              type: array
              items:
                $ref: '#/components/schemas/ModuleGraphicsComplianceEntry'

    # ── Auth ──

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          description: Username (case-insensitive).
          example: "john.doe"
        password:
          type: string
          format: password
          description: User password.
        code:
          type: string
          description: Optional 6-digit TOTP code for inline MFA verification.

    MfaVerifyRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          description: 6-digit TOTP code.
          example: "123456"
        username:
          type: string
          description: Optional fallback -- re-supply credentials if preauth session expired.
        password:
          type: string
          format: password
          description: Optional fallback password.

    AuthStatusResponse:
      type: object
      properties:
        ok:
          type: boolean
        logged_in:
          type: boolean
        mfa_pending:
          type: boolean
        enroll_pending:
          type: boolean
        pending_expires_in:
          type: integer
          nullable: true
          description: Seconds remaining for pending auth (MFA/enroll window).
        auth_expired:
          type: string
          nullable: true
          enum: [mfa, enroll, null]
          description: Which pending auth expired, if any.
        user:
          $ref: '#/components/schemas/UserPublic'
        csrf_token:
          type: string
        server_time:
          type: string
          format: date-time
        initialized:
          type: boolean
          description: Whether the user store has been initialized.

    LoginSuccessResponse:
      type: object
      properties:
        ok:
          type: boolean
          const: true
        logged_in:
          type: boolean
          const: true
        user:
          $ref: '#/components/schemas/UserPublic'
        csrf_token:
          type: string

    LoginMfaRequiredResponse:
      type: object
      properties:
        ok:
          type: boolean
          const: true
        mfa_required:
          type: boolean
          const: true
        enroll_required:
          type: boolean
          const: false
        message:
          type: string
        pending_expires_in:
          type: integer
        csrf_token:
          type: string

    LoginEnrollRequiredResponse:
      type: object
      properties:
        ok:
          type: boolean
          const: true
        mfa_required:
          type: boolean
          const: false
        enroll_required:
          type: boolean
          const: true
        issuer:
          type: string
        account:
          type: string
        secret:
          type: string
          description: Base32-encoded TOTP secret.
        otpauth_url:
          type: string
          format: uri
          description: OTP auth URL for QR code generation.
        message:
          type: string
        pending_expires_in:
          type: integer
        csrf_token:
          type: string

    # ── Users ──

    UserPublic:
      type: object
      description: Sanitized user record (no password hash or MFA secret).
      properties:
        username:
          type: string
        name:
          type: string
        role:
          type: string
          description: "Role key (e.g. admin, user, viewer, editor)."
        dept:
          type: string
          description: Department name.
        title:
          type: string
          description: Job title.
        phone:
          type: string
        personal_email:
          type: string
        cccd:
          type: string
          description: Vietnamese citizen ID.
        active:
          type: boolean
        mfa_enabled:
          type: boolean
        last_login:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UserUpsertRequest:
      type: object
      required: [username]
      properties:
        username:
          type: string
        name:
          type: string
        role:
          type: string
          default: "user"
        dept:
          type: string
        title:
          type: string
        phone:
          type: string
        personal_email:
          type: string
        cccd:
          type: string
        active:
          type: boolean
          default: true
        password:
          type: string
          format: password
          description: Password (generated if empty on create).

    RolePermissions:
      type: object
      additionalProperties:
        type: object
        properties:
          canCreateDocs:
            type: boolean
      example:
        admin:
          canCreateDocs: true
        editor:
          canCreateDocs: true
        user:
          canCreateDocs: false
        viewer:
          canCreateDocs: false

    # ── Documents ──

    DocumentSummary:
      type: object
      properties:
        code:
          type: string
          description: Document code (e.g. SOP-101).
        title:
          type: string
        cat:
          type: string
          description: Category (SOP, WI, FRM, ANNEX, JD, MAN, POL, etc.).
        path:
          type: string
          description: Relative file path from project root.
        folder:
          type: string
          description: Relative folder path.
        ext:
          type: string
          description: File extension (html, pdf, xlsx, etc.).
        rev:
          type: string
          description: Current revision string (e.g. "1.0").
        status:
          type: string
          enum: [draft, in_review, approved, obsolete]
        owner:
          type: string
          description: Owning department or person.

    DocCreateRequest:
      type: object
      required: [code, title, cat]
      properties:
        code:
          type: string
          description: Unique document code (e.g. SOP-999).
          pattern: '^[A-Z0-9-]{3,40}$'
        title:
          type: string
          description: Document title (ASCII only).
        cat:
          type: string
          description: Category code (SOP, WI, FRM, etc.).
        owner:
          type: string
          description: Owning department (defaults to user's dept).
        folder:
          type: string
          description: Target folder (auto-resolved if empty).
        revision:
          type: string
          description: Initial revision (e.g. "0.0").
          default: "0.0"

    DocState:
      type: object
      description: Document workflow state.
      properties:
        code:
          type: string
        status:
          type: string
          enum: [draft, in_review, approved]
        revision:
          type: string
        has_release:
          type: boolean
        released_revision:
          type: string
        approved_by:
          type: string
        approved_date:
          type: string
          format: date-time
        effective_date:
          type: string
          format: date
        rejectedBy:
          type: string
        rejectedDate:
          type: string
          format: date-time

    VersionEntry:
      type: object
      properties:
        status:
          type: string
          enum: [draft, in_review, approved, rejected]
        version:
          type: string
          description: Version label (e.g. "v1.0").
        date:
          type: string
          description: Human-readable datetime.
        by:
          type: string
          description: Name of the person who performed the action.
        file:
          type: string
          description: Relative path to the version file.
        note:
          type: string

    # ── Forms ──

    FormSummary:
      type: object
      properties:
        code:
          type: string
          description: Form code (e.g. FRM-631).
        title:
          type: string
        status:
          type: string
          description: Control status (e.g. RELEASED).
        rev:
          type: string

    FormEntry:
      type: object
      description: A submitted form entry with dynamic fields.
      properties:
        entry_id:
          type: string
        form_code:
          type: string
        submitted_by:
          type: string
        submitted_name:
          type: string
        submitted_at:
          type: string
          format: date-time
      additionalProperties: true

    # ── Dictionary ──

    DictItem:
      type: object
      properties:
        term:
          type: string
          description: English term.
        meaning:
          type: string
          description: Short meaning / expansion.
        vi:
          type: string
          description: Vietnamese translation.
        def:
          type: string
          description: Full definition.
        ctx:
          type: string
          description: Context / usage domain.
        rec:
          type: string
          description: Reference (ISO clause, standard, etc.).
        cat:
          type: string
          description: Category.
          default: "General"

    DictUpsertRequest:
      type: object
      required: [term, def]
      properties:
        term:
          type: string
        originalTerm:
          type: string
          description: Original term name if renaming (for lookup).
        meaning:
          type: string
        vi:
          type: string
        def:
          type: string
        ctx:
          type: string
        rec:
          type: string
        cat:
          type: string
          default: "General"

    # ── Admin ──

    DataCollectionSettings:
      type: object
      properties:
        collect_gps:
          type: boolean
          default: true
        collect_ip:
          type: boolean
          default: true
        collect_device:
          type: boolean
          default: true
        collect_navigation:
          type: boolean
          default: true
        collect_connection:
          type: boolean
          default: true
        require_consent:
          type: boolean
          default: true

    # ── Pagination ──

    CursorPageInfo:
      type: object
      description: Cursor-based pagination metadata.
      required: [limit, hasNextPage, hasPreviousPage]
      properties:
        limit:
          type: integer
          description: Maximum items per page.
        hasNextPage:
          type: boolean
          description: Whether more items exist after the last item in this page.
        hasPreviousPage:
          type: boolean
          description: Whether more items exist before the first item in this page.
        startCursor:
          type: string
          nullable: true
          description: Cursor pointing to the first item in this page.
        endCursor:
          type: string
          nullable: true
          description: Cursor pointing to the last item in this page.
        sort:
          type: array
          items:
            $ref: '#/components/schemas/SortClause'
          description: Active sort order applied to the result set.

    SortClause:
      type: object
      required: [field, direction]
      properties:
        field:
          type: string
          description: Field name being sorted on.
        direction:
          type: string
          enum: [asc, desc]
          description: Sort direction.

    # ── RFC 9457 Problem Detail ──

    ProblemDetail:
      type: object
      description: RFC 9457 Problem Details for HTTP APIs.
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
          description: URI reference identifying the problem type.
          example: "https://qms.hesem.com.vn/problems/validation-error"
        title:
          type: string
          description: Short human-readable summary of the problem type.
          example: "Validation Error"
        status:
          type: integer
          description: HTTP status code.
          example: 422
        detail:
          type: string
          description: Human-readable explanation specific to this occurrence.
        instance:
          type: string
          format: uri
          description: URI reference identifying the specific occurrence.
        code:
          type: string
          description: Machine-readable error code.
        trace_id:
          type: string
          description: Distributed trace identifier for correlation.
        current_etag:
          type: string
          description: Current ETag value when a concurrency conflict occurs.
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                description: JSON pointer or field name.
              message:
                type: string
                description: Validation error message.
              code:
                type: string
                description: Machine-readable validation error code.
          description: Detailed validation errors for 422 responses.

    # ── Foundation Items ──

    OrganizationItem:
      type: object
      description: A single organization record.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        code:
          type: string
        type:
          type: string
          description: Organization type (e.g. internal, supplier, customer).
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PartyItem:
      type: object
      description: A single party record (contact, supplier, customer).
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        role:
          type: string
        organizationId:
          type: string
          format: uuid
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CalendarItem:
      type: object
      description: A single calendar record.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        timezone:
          type: string
          description: IANA timezone identifier.
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ── Governance Items ──

    ApprovalGroupItem:
      type: object
      description: Summary of an approval group for list views.
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        status:
          type: string
          description: Current workflow status.
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ApprovalGroupDetail:
      type: object
      description: Full detail of an approval group.
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        status:
          type: string
          description: Current workflow status.
        participants:
          type: array
          items:
            type: object
            properties:
              userId:
                type: string
              name:
                type: string
              role:
                type: string
              decision:
                type: string
                nullable: true
              decidedAt:
                type: string
                format: date-time
                nullable: true
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ApprovalDecisionResult:
      type: object
      description: Result of a decision action on an approval group.
      properties:
        approvalGroupId:
          type: string
          format: uuid
        decisionCode:
          type: string
          enum: [approve, reject, request_changes]
        newStatus:
          type: string
          description: Updated status after the decision.
        decidedBy:
          type: string
        decidedAt:
          type: string
          format: date-time

    TimelineEvent:
      type: object
      description: A single timeline event in an approval group.
      properties:
        id:
          type: string
          format: uuid
        eventType:
          type: string
          description: Type of event (decision, comment, status_change, attachment_added).
        actor:
          type: string
          description: Username or ID of the person who performed the action.
        summary:
          type: string
          description: Human-readable summary of the event.
        detail:
          type: object
          additionalProperties: true
          description: Event-specific payload.
        occurredAt:
          type: string
          format: date-time

    AttachmentItem:
      type: object
      description: Summary of an attachment for list views.
      properties:
        id:
          type: string
          format: uuid
        filename:
          type: string
        contentType:
          type: string
        sizeBytes:
          type: integer
          format: int64
        uploadedBy:
          type: string
        uploadedAt:
          type: string
          format: date-time

    AttachmentDetail:
      type: object
      description: Full detail of an attachment.
      properties:
        id:
          type: string
          format: uuid
        filename:
          type: string
        contentType:
          type: string
        sizeBytes:
          type: integer
          format: int64
        description:
          type: string
        approvalGroupId:
          type: string
          format: uuid
          nullable: true
        downloadUrl:
          type: string
          format: uri
        uploadedBy:
          type: string
        uploadedAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ── Connection Wrappers (cursor-paginated lists) ──

    OrganizationConnection:
      type: object
      required: [data, pageInfo]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/OrganizationItem'
        pageInfo:
          $ref: '#/components/schemas/CursorPageInfo'

    PartyConnection:
      type: object
      required: [data, pageInfo]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PartyItem'
        pageInfo:
          $ref: '#/components/schemas/CursorPageInfo'

    CalendarConnection:
      type: object
      required: [data, pageInfo]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CalendarItem'
        pageInfo:
          $ref: '#/components/schemas/CursorPageInfo'

    ApprovalGroupConnection:
      type: object
      required: [data, pageInfo]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ApprovalGroupItem'
        pageInfo:
          $ref: '#/components/schemas/CursorPageInfo'

    ApprovalTimelineConnection:
      type: object
      required: [data, pageInfo]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TimelineEvent'
        pageInfo:
          $ref: '#/components/schemas/CursorPageInfo'

    AttachmentConnection:
      type: object
      required: [data, pageInfo]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AttachmentItem'
        pageInfo:
          $ref: '#/components/schemas/CursorPageInfo'

    # ── Envelope Wrappers (single-object detail) ──

    ApprovalGroupEnvelope:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/ApprovalGroupDetail'

    ApprovalDecisionResultEnvelope:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/ApprovalDecisionResult'

    AttachmentEnvelope:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/AttachmentDetail'

